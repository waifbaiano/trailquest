<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1b5e20">
    <title>TrailQuest Enterprise v8.0</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@300;500;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1b5e20;
            --accent: #ffab00;
            --danger: #b71c1c;
            --bg-tactical: #fdfdf5;
            --text-main: #1a1a1a;
            --border-heavy: #2e1a16;
            --shadow-tactical: 8px 8px 0px #2e1a16;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; font-family: 'Roboto Mono', monospace; overflow: hidden; }

        /* Map Engine Layer */
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; filter: saturate(1.2) contrast(1.1); }

        /* UI Layers */
        .ui-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; }
        .ui-overlay * { pointer-events: auto; }

        .modal-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }

        .container-tactical {
            background: var(--bg-tactical); border: 3px solid var(--border-heavy);
            padding: 25px; width: 92%; max-width: 450px; box-shadow: var(--shadow-tactical);
            max-height: 85vh; overflow-y: auto;
        }

        /* Typography */
        h1 { font-family: 'Special Elite', serif; color: var(--primary); font-size: 2.2rem; text-align: center; margin-bottom: 20px; }
        h2 { font-family: 'Montserrat'; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--primary); margin: 15px 0 10px; padding-bottom: 4px; }

        /* Tactical Inputs */
        .tq-input {
            width: 100%; padding: 14px; margin-bottom: 12px;
            border: 2px solid #ccc; background: white; font-family: inherit; font-size: 1rem;
        }
        .tq-input:focus { border-color: var(--accent); outline: none; }

        /* Action Buttons */
        .tq-btn {
            width: 100%; padding: 16px; border: none; font-family: 'Montserrat';
            font-weight: 900; text-transform: uppercase; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-ghost { background: transparent; border: 2px solid var(--border-heavy); color: var(--border-heavy); }

        /* Rodapé de Navegação Alta Performance */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 75px;
            background: white; border-top: 3px solid var(--border-heavy);
            display: flex; justify-content: space-around; padding-top: 8px; z-index: 1500;
        }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 0.65rem; font-weight: 700; font-family: 'Montserrat'; }
        .nav-item span { display: block; font-size: 1.6rem; margin-bottom: 2px; }
        .nav-item.active { color: var(--primary); }

        /* Marker & Pins */
        .pin-number {
            background: var(--primary); color: white; border: 2px solid white;
            border-radius: 50%; width: 30px; height: 30px; display: flex;
            align-items: center; justify-content: center; font-weight: 900;
        }

        /* Stats Graph */
        .stats-chart { display: flex; align-items: flex-end; gap: 6px; height: 100px; margin: 20px 0; }
        .chart-bar { flex: 1; background: var(--primary); border-radius: 2px 2px 0 0; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-mount" class="ui-overlay"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        /**
         * ENGINE TQ v8.0 - MICRO-MODULAR ARCHITECTURE
         */
        
        const TQ = {
            // Módulo de Estado Global
            state: {
                user: JSON.parse(localStorage.getItem('tq_session')) || null,
                view: 'splash',
                isTracking: false,
                currentMap: 0,
                maps: JSON.parse(localStorage.getItem('tq_maps')) || [
                    { name: 'Mapa Principal', color: 'green', points: [] },
                    { name: 'Mapa Secundário', color: 'red', points: [] },
                    { name: 'Mapa Alfa', color: 'yellow', points: [] },
                    { name: 'Mapa Bravo', color: 'blue', points: [] },
                    { name: 'Mapa Operacional', color: 'black', points: [] }
                ],
                config: { groups: 1, ppx: 1, leaders: 1 },
                timer: { start: null, elapsed: 0, interval: null },
                connectedUsers: [] // Real-time buffer
            },

            // Módulo de Inicialização
            init() {
                this.mapEngine.init();
                this.auth.checkSession();
                this.uiController.render();
                this.gpsTracker.init();
            },

            // Módulo de Autenticação
            auth: {
                checkSession() {
                    if (TQ.state.user && TQ.state.user.id) {
                        TQ.state.view = 'command';
                    }
                },
                login(email, password, nick) {
                    if (password.length < 8) return alert("Senha mínima 8 caracteres.");
                    TQ.state.user = { email, nick, id: 'ID_' + Math.random().toString(36).substr(2, 9) };
                    localStorage.setItem('tq_session', JSON.stringify(TQ.state.user));
                    TQ.state.view = 'command';
                    TQ.uiController.render();
                },
                logout() {
                    localStorage.removeItem('tq_session');
                    location.reload();
                }
            },

            // Módulo de Mapa (Leaflet Engine)
            mapEngine: {
                instance: null,
                markers: [],
                init() {
                    this.instance = L.map('map', { 
                        zoomControl: false, 
                        attributionControl: false 
                    }).setView([-23.55, -46.63], 15);

                    // Satélite Permanente
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        maxZoom: 19
                    }).addTo(this.instance);

                    this.instance.on('click', (e) => TQ.objectives.add(e.latlng));
                },
                refresh() {
                    this.markers.forEach(m => this.instance.removeLayer(m));
                    this.markers = [];
                    
                    const currentPoints = TQ.state.maps[TQ.state.currentMap].points;
                    currentPoints.forEach((p, idx) => {
                        const m = L.marker(p.latlng, {
                            icon: L.divIcon({
                                className: '',
                                html: `<div class="pin-number" style="background:${TQ.state.maps[TQ.state.currentMap].color}">${p.num}</div>`,
                                iconSize: [30,30]
                            })
                        }).addTo(this.instance);
                        
                        m.on('click', (e) => {
                            L.DomEvent.stopPropagation(e);
                            TQ.uiController.openPointMenu(p);
                        });
                        this.markers.push(m);
                    });
                }
            },

            // Módulo de GPS e Rastreamento
            gpsTracker: {
                init() {
                    navigator.geolocation.watchPosition(
                        (pos) => this.handleUpdate(pos),
                        (err) => console.error(err),
                        { enableHighAccuracy: true }
                    );
                },
                handleUpdate(pos) {
                    const latlng = [pos.coords.latitude, pos.coords.longitude];
                    // Throttling logic aqui para 2 segundos
                    if (TQ.state.user) {
                        // Sincronizar com banco (Supabase/Firebase)
                    }
                    if (!this.userMarker) {
                        this.userMarker = L.circleMarker(latlng, { color: 'blue', radius: 8 }).addTo(TQ.mapEngine.instance);
                    } else {
                        this.userMarker.setLatLng(latlng);
                    }
                }
            },

            // Módulo de Objetivos (Lógica de Reordenação)
            objectives: {
                add(latlng) {
                    const map = TQ.state.maps[TQ.state.currentMap];
                    const num = map.points.length + 1;
                    const code = Math.floor(100000 + Math.random() * 900000);
                    map.points.push({ id: Date.now(), num, name: 'Ponto ' + num, code, latlng });
                    this.save();
                    TQ.mapEngine.refresh();
                },
                reorder(pointId, newNum) {
                    const map = TQ.state.maps[TQ.state.currentMap];
                    const oldPoint = map.points.find(p => p.id === pointId);
                    const targetPoint = map.points.find(p => p.num === parseInt(newNum));
                    
                    if (targetPoint) {
                        targetPoint.num = oldPoint.num;
                    }
                    oldPoint.num = parseInt(newNum);
                    
                    map.points.sort((a, b) => a.num - b.num);
                    this.save();
                    TQ.mapEngine.refresh();
                },
                delete(pointId) {
                    const map = TQ.state.maps[TQ.state.currentMap];
                    map.points = map.points.filter(p => p.id !== pointId);
                    map.points.forEach((p, i) => p.num = i + 1); // Auto-reparar números
                    this.save();
                    TQ.mapEngine.refresh();
                },
                save() {
                    localStorage.setItem('tq_maps', JSON.stringify(TQ.state.maps));
                }
            },

            // Módulo Cronômetro
            activities: {
                start() {
                    TQ.state.timer.start = Date.now() - TQ.state.timer.elapsed;
                    TQ.state.timer.interval = setInterval(() => {
                        TQ.state.timer.elapsed = Date.now() - TQ.state.timer.start;
                        TQ.uiController.updateChronoUI();
                    }, 1000);
                },
                pause() {
                    clearInterval(TQ.state.timer.interval);
                },
                stop() {
                    this.pause();
                    // Salvar no histórico
                    TQ.state.timer.elapsed = 0;
                    TQ.uiController.updateChronoUI();
                }
            },

            // Controlador de Interface (UI)
            uiController: {
                render() {
                    const mount = document.getElementById('ui-mount');
                    mount.innerHTML = '';

                    if (TQ.state.view === 'splash') {
                        mount.innerHTML = `
                            <div class="modal-screen">
                                <div class="container-tactical">
                                    <h1>TrailQuest</h1>
                                    <button class="tq-btn btn-primary" onclick="TQ.state.view='login'; TQ.uiController.render()">Entrar / Registrar</button>
                                    <button class="tq-btn btn-ghost" onclick="TQ.state.view='command'; TQ.uiController.render()">Modo Participante</button>
                                </div>
                            </div>`;
                    } else if (TQ.state.view === 'login') {
                        mount.innerHTML = `
                            <div class="modal-screen">
                                <div class="container-tactical">
                                    <h2>Acesso Seguro</h2>
                                    <input type="text" id="l-nick" class="tq-input" placeholder="Nickname">
                                    <input type="email" id="l-email" class="tq-input" placeholder="Email">
                                    <input type="password" id="l-pass" class="tq-input" placeholder="Senha (min 8)">
                                    <button class="tq-btn btn-primary" onclick="TQ.auth.login(document.getElementById('l-email').value, document.getElementById('l-pass').value, document.getElementById('l-nick').value)">Confirmar</button>
                                    <button class="tq-btn btn-ghost" onclick="TQ.state.view='splash'; TQ.uiController.render()">Voltar</button>
                                </div>
                            </div>`;
                    } else if (TQ.state.view === 'command') {
                        mount.innerHTML = `
                            <div id="chrono-hud" style="position:fixed; top:20px; right:20px; background:white; padding:10px; border:2px solid var(--border-heavy); font-weight:900; box-shadow:4px 4px 0 var(--border-heavy)">00:00:00</div>
                            <nav class="bottom-nav">
                                <div class="nav-item active" onclick="TQ.uiController.render()"><span>🏠</span>Início</div>
                                <div class="nav-item" onclick="TQ.uiController.openMapEditor()"><span>🗺️</span>Mapas</div>
                                <div class="nav-item" onclick="TQ.uiController.openActivityMenu()"><span>🏁</span>Atividade</div>
                                <div class="nav-item" onclick="TQ.uiController.openProfile()"><span>👤</span>Perfil</div>
                            </nav>`;
                    }
                },

                updateChronoUI() {
                    const el = document.getElementById('chrono-hud');
                    if (!el) return;
                    const d = new Date(TQ.state.timer.elapsed);
                    el.innerText = d.toISOString().substr(11, 8);
                },

                openPointMenu(p) {
                    const div = document.createElement('div');
                    div.className = 'modal-screen';
                    div.innerHTML = `
                        <div class="container-tactical">
                            <h2>Ponto ${p.num}</h2>
                            <p style="font-size:0.7rem; margin-bottom:10px">ID de Registro: ${p.code}</p>
                            <input type="text" id="p-name" class="tq-input" value="${p.name}">
                            <input type="number" id="p-num" class="tq-input" value="${p.num}">
                            <button class="tq-btn btn-primary" onclick="TQ.objectives.reorder(${p.id}, document.getElementById('p-num').value); this.closest('.modal-screen').remove()">Atualizar</button>
                            <button class="tq-btn btn-accent" onclick="TQ.objectives.delete(${p.id}); this.closest('.modal-screen').remove()">Excluir</button>
                            <button class="tq-btn btn-ghost" onclick="this.closest('.modal-screen').remove()">Fechar</button>
                        </div>`;
                    document.body.appendChild(div);
                },

                openMapEditor() {
                    const div = document.createElement('div');
                    div.className = 'modal-screen';
                    div.innerHTML = `
                        <div class="container-tactical">
                            <h2>Seletor de Mapas</h2>
                            ${TQ.state.maps.map((m, i) => `
                                <div onclick="TQ.state.currentMap=${i}; TQ.mapEngine.refresh(); this.closest('.modal-screen').remove()" 
                                     style="padding:15px; border:2px solid ${m.color}; margin-bottom:10px; cursor:pointer; background: ${TQ.state.currentMap === i ? '#eee' : 'white'}">
                                    <b>${m.name}</b> (${m.points.length} pontos)
                                </div>
                            `).join('')}
                            <button class="tq-btn btn-ghost" onclick="this.closest('.modal-screen').remove()">Voltar</button>
                        </div>`;
                    document.body.appendChild(div);
                },

                openProfile() {
                    const div = document.createElement('div');
                    div.className = 'modal-screen';
                    div.innerHTML = `
                        <div class="container-tactical">
                            <h2>Perfil Operacional</h2>
                            <p><b>Nick:</b> ${TQ.state.user ? TQ.state.user.nick : 'Visitante'}</p>
                            <p><b>Status:</b> ${TQ.state.user ? 'Registrado' : 'Anônimo'}</p>
                            
                            <h2>Mensal</h2>
                            <div class="stats-chart">
                                ${Array.from({length:7}, () => `<div class="chart-bar" style="height:${Math.random()*100}%"></div>`).join('')}
                            </div>
                            
                            <button class="tq-btn btn-primary" onclick="TQ.auth.logout()">Sair da Conta</button>
                            <button class="tq-btn btn-ghost" onclick="this.closest('.modal-screen').remove()">Voltar</button>
                        </div>`;
                    document.body.appendChild(div);
                },

                openActivityMenu() {
                    const div = document.createElement('div');
                    div.className = 'modal-screen';
                    div.innerHTML = `
                        <div class="container-tactical">
                            <h2>Comando de Atividade</h2>
                            <button class="tq-btn btn-primary" onclick="TQ.activities.start(); this.closest('.modal-screen').remove()">Iniciar</button>
                            <button class="tq-btn btn-accent" onclick="TQ.activities.pause(); this.closest('.modal-screen').remove()">Pausar</button>
                            <button class="tq-btn btn-ghost" onclick="TQ.activities.stop(); this.closest('.modal-screen').remove()">Finalizar</button>
                            <button class="tq-btn btn-ghost" onclick="this.closest('.modal-screen').remove()">Voltar</button>
                        </div>`;
                    document.body.appendChild(div);
                }
            }
        };

        window.onload = () => TQ.init();
    </script>
</body>
</html>
