<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest OMNI-SURGERY v10</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@300;500;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1b5e20;
            --accent: #ffab00;
            --bg: #fdfdf5;
            --dark: #1a1a1a;
            --border: #2e1a16;
            --shadow: 10px 10px 0px #2e1a16;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; font-family: 'Roboto Mono', monospace; overflow: hidden; }

        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }

        /* UI Containers */
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .ui-layer * { pointer-events: auto; }

        .window {
            background: var(--bg); border: 3px solid var(--border);
            padding: 25px; width: 92%; max-width: 440px; margin: auto;
            box-shadow: var(--shadow); position: relative;
            max-height: 85vh; overflow-y: auto;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }

        h1 { font-family: 'Special Elite', serif; color: var(--primary); font-size: 2.5rem; text-align: center; margin-bottom: 10px; }
        h2 { font-family: 'Montserrat'; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--primary); margin: 15px 0 10px; padding-bottom: 5px; }
        
        /* Inputs Totalmente Limpos */
        .tq-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #ccc; background: #fff; font-family: inherit; font-size: 1rem; }
        
        .tq-btn { width: 100%; padding: 18px; border: none; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-green { background: var(--primary); color: white; }
        .btn-gold { background: var(--accent); color: #000; }
        .btn-cancel { background: #333; color: #eee; }

        /* Menu Rodapé com Comando Central */
        .footer-nav {
            position: fixed; bottom: 0; width: 100%; background: #fff;
            border-top: 3px solid var(--border); display: flex;
            justify-content: space-around; padding: 10px 0 25px; z-index: 1000;
        }
        .nav-link { text-align: center; color: #777; font-family: 'Montserrat'; font-size: 0.6rem; font-weight: 700; flex: 1; text-decoration: none; }
        .nav-link span { font-size: 1.5rem; display: block; }
        .nav-link.active { color: var(--primary); }
        
        .btn-center-continue { 
            background: var(--primary); color: white; border-radius: 50%; 
            width: 60px; height: 60px; display: flex; align-items: center; 
            justify-content: center; transform: translateY(-30px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 3px solid #fff;
        }

        /* Edição de Pontos */
        .edit-hud { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; background: var(--bg); border: 2px solid var(--border); padding: 15px; z-index: 1001; box-shadow: var(--shadow); }
        .marker-tactical { background: var(--primary); color: white; border: 2px solid white; border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        /* Calendário e Perfil */
        .chart-row { display: flex; align-items: flex-end; gap: 4px; height: 60px; margin-bottom: 20px; }
        .chart-bar { background: var(--primary); flex: 1; border-radius: 2px 2px 0 0; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .cal-day { background: white; border: 1px solid #ddd; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; border-radius: 50%; position: relative; }
        .cal-hot::after { content: '🔥'; position: absolute; top: -5px; font-size: 0.7rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="app"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const TQ = {
            state: {
                user: { nick: '', email: '', isLogged: false },
                config: { groups: 0, ppx: 0, fix: 0, mov: 0, extra: '' },
                maps: [null, null, null, null, null],
                activeSlot: 0,
                points: [],
                connections: [], // Simulação de usuários conectados
                editMode: false,
                view: 'splash'
            },

            map: null,
            markers: [],

            init() {
                this.initMap();
                this.render();
            },

            initMap() {
                this.map = L.map('map', { zoomControl: false }).setView([-23.5, -46.6], 12);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(this.map);
                this.map.on('click', (e) => { if(this.state.editMode) this.addPoint(e.latlng); });
            },

            render() {
                const root = document.getElementById('app');
                root.innerHTML = '';

                if(this.state.view === 'splash') this.viewSplash(root);
                if(this.state.view === 'login') this.viewLogin(root);
                if(this.state.view === 'dashboard') this.viewDashboard(root);
            },

            // --- TELAS ---
            viewSplash(root) {
                root.innerHTML = `
                    <div class="overlay">
                        <div class="window">
                            <h1>TrailQuest</h1>
                            <button class="tq-btn btn-green" onclick="TQ.navigate('login')">Acesso Organizador</button>
                            <button class="tq-btn btn-gold" onclick="TQ.navigate('dashboard')">Entrar com Código</button>
                        </div>
                    </div>
                `;
            },

            viewLogin(root) {
                root.innerHTML = `
                    <div class="overlay">
                        <div class="window">
                            <h2>Autenticação</h2>
                            <h2>E-mail</h2>
                            <input type="text" id="log-email" class="tq-input">
                            <h2>Senha</h2>
                            <input type="password" id="log-pass" class="tq-input">
                            <button class="tq-btn btn-green" onclick="TQ.doLogin()">Entrar</button>
                            <button class="tq-btn btn-cancel" onclick="TQ.navigate('splash')">Voltar</button>
                        </div>
                    </div>
                `;
            },

            viewDashboard(root) {
                this.state.editMode = false;
                root.innerHTML = `
                    <div class="ui-layer" id="hud-edit"></div>
                    <nav class="footer-nav">
                        <div class="nav-link active" onclick="TQ.navigate('dashboard')"><span>🏠</span>Início</div>
                        <div class="nav-link" onclick="TQ.openSettings()"><span>⚙️</span>Ajustes</div>
                        <div class="btn-center-continue" onclick="TQ.generateFinalCode()"><span>➡️</span></div>
                        <div class="nav-link" onclick="TQ.openRadar()"><span>📡</span>Radar</div>
                        <div class="nav-link" onclick="TQ.openProfile()"><span>👤</span>Perfil</div>
                    </nav>
                `;
            },

            // --- LÓGICA DE NAVEGAÇÃO E AÇÕES ---
            navigate(view) {
                this.state.view = view;
                this.render();
            },

            doLogin() {
                this.state.user.isLogged = true;
                this.navigate('dashboard');
            },

            openSettings() {
                const root = document.getElementById('app');
                const div = document.createElement('div');
                div.className = 'overlay';
                div.innerHTML = `
                    <div class="window">
                        <h1>Configuração</h1>
                        <h2>Quantidade de Grupos</h2>
                        <input type="number" id="cfg-groups" class="tq-input">
                        <h2>Líderes por Grupo</h2>
                        <input type="number" id="cfg-lead" class="tq-input">
                        <h2>Objetivos Fixos</h2>
                        <input type="number" id="cfg-fix" class="tq-input">
                        <h2>Objetivos Móveis</h2>
                        <input type="number" id="cfg-mov" class="tq-input">
                        <h2>Informação Adicional (Opcional)</h2>
                        <input type="text" id="cfg-extra" class="tq-input">
                        <button class="tq-btn btn-green" onclick="TQ.saveConfig()">Salvar e Editar Mapa</button>
                        <button class="tq-btn btn-cancel" onclick="TQ.navigate('dashboard')">Cancelar</button>
                    </div>
                `;
                root.appendChild(div);
            },

            saveConfig() {
                this.state.config = {
                    groups: document.getElementById('cfg-groups').value,
                    fix: document.getElementById('cfg-fix').value,
                    mov: document.getElementById('cfg-mov').value,
                    extra: document.getElementById('cfg-extra').value
                };
                this.startEditor();
            },

            startEditor() {
                this.state.editMode = true;
                this.navigate('dashboard');
                this.updateHud();
            },

            updateHud() {
                const hud = document.getElementById('hud-edit');
                hud.innerHTML = `
                    <div class="edit-hud">
                        <div style="display:flex; justify-content:space-between; align-items:center">
                            <b>Edição: Slot ${this.state.activeSlot + 1}</b>
                            <button class="tq-btn btn-green" style="width:auto; padding:5px 10px; margin:0; font-size:0.6rem" onclick="TQ.selectSlotMenu()">Trocar Mapa</button>
                        </div>
                    </div>
                `;
            },

            selectSlotMenu() {
                const div = document.createElement('div');
                div.className = 'overlay';
                div.innerHTML = `
                    <div class="window">
                        <h2>Selecionar Slot de Mapa</h2>
                        ${this.state.maps.map((m, i) => `
                            <button class="tq-btn btn-cancel" style="background:${this.state.activeSlot === i ? '#1b5e20' : '#444'}" onclick="TQ.changeSlot(${i})">Mapa ${i+1}</button>
                        `).join('')}
                        <button class="tq-btn btn-gold" onclick="this.parentElement.parentElement.remove()">Voltar</button>
                    </div>
                `;
                document.getElementById('app').appendChild(div);
            },

            changeSlot(i) {
                this.state.activeSlot = i;
                // Lógica de persistência de pontos por slot aqui
                document.querySelector('.overlay').remove();
                this.updateHud();
            },

            addPoint(latlng) {
                const code = Math.floor(100000 + Math.random() * 900000);
                const p = { latlng, code, id: Date.now() };
                this.state.points.push(p);
                
                const marker = L.marker(latlng, {
                    icon: L.divIcon({ className: '', html: `<div class="marker-tactical">${this.state.points.length}</div>` })
                }).addTo(this.map);
                
                marker.on('click', () => this.pointMenu(p));
                this.markers.push(marker);
            },

            pointMenu(p) {
                const div = document.createElement('div');
                div.className = 'overlay';
                div.innerHTML = `
                    <div class="window">
                        <h2>Configurar Ponto</h2>
                        <h2>Título do Ponto</h2>
                        <input type="text" class="tq-input" id="p-title">
                        <h2>Código Gerado</h2>
                        <div style="background:#fff; padding:15px; border:2px dashed #1b5e20; text-align:center; font-size:1.5rem; font-weight:900">
                            ${p.code}
                        </div>
                        <button class="tq-btn btn-green" onclick="this.parentElement.parentElement.remove()">Salvar</button>
                        <button class="tq-btn btn-cancel" onclick="TQ.removePoint(${p.id})">Excluir Ponto</button>
                    </div>
                `;
                document.getElementById('app').appendChild(div);
            },

            openRadar() {
                const div = document.createElement('div');
                div.className = 'overlay';
                // Radar Inteligente: Só mostra conteúdo se houver conexões
                const content = this.state.connections.length > 0 ? 
                    this.state.connections.map(c => `<div style="padding:10px; background:#fff; margin-bottom:5px">👤 ${c.nick}</div>`).join('') :
                    `<p style="text-align:center; opacity:0.5">Aguardando usuários...</p>`;

                div.innerHTML = `
                    <div class="window">
                        <h1>Radar Ativo</h1>
                        <div style="margin:15px 0">${content}</div>
                        <button class="tq-btn btn-cancel" onclick="this.parentElement.parentElement.remove()">Fechar</button>
                    </div>
                `;
                document.getElementById('app').appendChild(div);
            },

            openProfile() {
                const div = document.createElement('div');
                div.className = 'overlay';
                div.innerHTML = `
                    <div class="window">
                        <h1>Meu Perfil</h1>
                        <h2>Alterar Nickname</h2>
                        <input type="text" id="new-nick" class="tq-input">
                        <button class="tq-btn btn-green" onclick="TQ.updateNick()">Atualizar Identidade</button>
                        
                        <h2>Atividade Recente</h2>
                        <div class="chart-row">
                            <div class="chart-bar" style="height:30%"></div>
                            <div class="chart-bar" style="height:70%"></div>
                            <div class="chart-bar" style="height:50%"></div>
                            <div class="chart-bar" style="height:90%"></div>
                        </div>

                        <h2>Calendário Strava</h2>
                        <div class="calendar">
                            ${Array.from({length: 28}, (_, i) => `<div class="cal-day ${[2,10,15,22].includes(i) ? 'cal-hot' : ''}">${i+1}</div>`).join('')}
                        </div>
                        <button class="tq-btn btn-cancel" onclick="this.parentElement.parentElement.remove()">Voltar</button>
                    </div>
                `;
                document.getElementById('app').appendChild(div);
            },

            updateNick() {
                this.state.user.nick = document.getElementById('new-nick').value;
                alert("Identidade atualizada!");
            },

            generateFinalCode() {
                const code = Math.floor(100000 + Math.random() * 900000);
                const div = document.createElement('div');
                div.className = 'overlay';
                div.innerHTML = `
                    <div class="window" style="text-align:center">
                        <h1>CÓDIGO DA MISSÃO</h1>
                        <div style="font-size:3.5rem; font-weight:900; letter-spacing:8px; color:#1b5e20; margin:20px 0">
                            ${code}
                        </div>
                        <button class="tq-btn btn-green" onclick="this.parentElement.parentElement.remove()">Finalizar</button>
                    </div>
                `;
                document.getElementById('app').appendChild(div);
            }
        };

        window.onload = () => TQ.init();
    </script>
</body>
</html>
