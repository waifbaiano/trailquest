<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlRyYWlsUXVlc3QiLAogICJzaG9ydF9uYW1lIjogIlRyYWlsUXVlc3QiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzRhN2M1YiIsCiAgInRoZW1lX2NvbG9yIjogIzRhN2M1YiIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzI4NTYvMjg1NjM2Ny5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <style>
        /* --- ESTILOS GERAIS --- */
        :root {
            --cor-bege: #f5f5dc;
            --cor-verde: #2d5a27;
            --cor-marrom: #5d4037;
            --cor-amarela: #fbc02d;
            --font-vintage: 'Crimson Text', serif;
            --font-titulo: 'Dancing Script', cursive;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-vintage);
            background-color: #000;
        }

        /* Fundo com Imagem de Floresta */
        .bg-floresta {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* --- CABEÇALHO --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            z-index: 1000;
            pointer-events: none;
        }

        h1 {
            font-family: var(--font-titulo);
            color: white;
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }

        /* --- CONTAINER DE PÁGINAS --- */
        .page {
            display: none;
            height: 100vh;
            width: 100vw;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 80px; /* Espaço para o título */
            box-sizing: border-box;
        }

        .page.active {
            display: flex;
        }

        /* --- ESTILO DO MAPA --- */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Botão Minha Posição */
        .btn-posicao {
            position: absolute;
            bottom: 100px;
            right: 20px;
            z-index: 1000;
            background-color: var(--cor-bege);
            border: 2px solid var(--cor-verde);
            padding: 10px 15px;
            border-radius: 50px;
            font-weight: bold;
            color: var(--cor-verde);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            font-family: var(--font-vintage);
        }

        /* --- CARTÕES E INTERFACE --- */
        .card {
            background-color: var(--cor-bege);
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid var(--cor-marrom);
        }

        h2 {
            color: var(--cor-marrom);
            margin-top: 0;
        }

        .info-perfil {
            text-align: left;
            margin: 15px 0;
            font-size: 1.2rem;
        }

        /* --- MENU INFERIOR --- */
        nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background-color: rgba(245, 245, 220, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 2000;
            border: 1px solid var(--cor-marrom);
        }

        .nav-item {
            text-decoration: none;
            color: var(--cor-marrom);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--cor-verde);
        }

        /* Ícones simples via CSS */
        .icon {
            width: 24px;
            height: 24px;
            margin-bottom: 4px;
            background-color: currentColor;
            mask-size: contain;
            mask-repeat: no-repeat;
            mask-position: center;
            -webkit-mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            -webkit-mask-position: center;
        }
    </style>
</head>
<body>

    <div class="bg-floresta"></div>

    <header>
        <h1>TrailQuest</h1>
    </header>

    <main id="page-mapa" class="page active" style="padding: 0;">
        <div id="map"></div>
        <button class="btn-posicao" onclick="centralizarMapa()">Minha posição</button>
    </main>

    <section id="page-atividades" class="page">
        <div class="card">
            <h2>Histórico de atividades</h2>
            <p>Nenhuma atividade registrada ainda.</p>
        </div>
    </section>

    <section id="page-perfil" class="page">
        <div class="card">
            <h2>Perfil do Aventureiro</h2>
            <div class="info-perfil">
                <p><strong>Nickname:</strong> Explorador_Raiz</p>
                <p><strong>Email:</strong> usuario@trailquest.com</p>
            </div>
        </div>
    </section>

    <nav>
        <div class="nav-item active" onclick="switchPage('page-mapa', this)">
            <span>Mapa</span>
        </div>
        <div class="nav-item" onclick="switchPage('page-atividades', this)">
            <span>Atividades</span>
        </div>
        <div class="nav-item" onclick="switchPage('page-perfil', this)">
            <span>Perfil</span>
        </div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        /* --- CONFIGURAÇÃO DO MAPA --- */
        let map;
        let userMarker;
        let userLocation = [-23.5505, -46.6333]; // Coordenada padrão (SP) até obter GPS

        function initMap() {
            // Inicializa o mapa focado na posição padrão
            map = L.map('map', {
                zoomControl: false, // Otimização para mobile
                tap: false         // Melhora fluidez em telas touch
            }).setView(userLocation, 16);

            // Camada de Satélite (Esri World Imagery)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri &mdash; Source: Esri, i-cubed, USDA, USGS, AEX, GeoEye, Getmapping, Aerogrid, IGN, IGP, UPR-EBP, and the GIS User Community',
                maxZoom: 19
            }).addTo(map);

            // Marcador azul para o usuário
            const blueIcon = L.divIcon({
                className: 'custom-div-icon',
                html: "<div style='background-color:#2196F3; width:15px; height:15px; border-radius:50%; border:3px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);'></div>",
                iconSize: [15, 15],
                iconAnchor: [7, 7]
            });

            userMarker = L.marker(userLocation, { icon: blueIcon }).addTo(map)
                .bindPopup("Você está aqui").openPopup();

            // Inicia monitoramento de localização
            watchPosition();
        }

        /* --- GEOLOCALIZAÇÃO --- */
        function watchPosition() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    const { latitude, longitude } = position.coords;
                    const newPos = [latitude, longitude];
                    
                    userLocation = newPos;
                    userMarker.setLatLng(newPos);
                    
                    // Atualiza suavemente sem forçar zoom se o usuário estiver explorando
                }, (error) => {
                    console.error("Erro ao obter localização: ", error);
                }, {
                    enableHighAccuracy: true,
                    maximumAge: 3000,
                    timeout: 10000
                });
            }
        }

        function centralizarMapa() {
            map.setView(userLocation, 17);
        }

        /* --- NAVEGAÇÃO ENTRE PÁGINAS --- */
        function switchPage(pageId, element) {
            // Remove classe ativa de todas as páginas e itens do menu
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            // Ativa a página e o botão selecionado
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');

            // Se for a página de mapa, garante que o Leaflet recalcule o tamanho
            if (pageId === 'page-mapa') {
                setTimeout(() => {
                    map.invalidateSize();
                }, 100);
            }
        }

        /* --- SERVICE WORKER (PWA) --- */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swCode = `
                    const CACHE_NAME = 'trailquest-v1';
                    const assets = [
                        '/',
                        'index.html',
                        'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css',
                        'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js'
                    ];
                    self.addEventListener('install', e => {
                        e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(assets)));
                    });
                    self.addEventListener('fetch', e => {
                        e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
                    });
                `;
                const blob = new Blob([swCode], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl);
            });
        }

        // Inicialização ao carregar
        window.onload = initMap;

    </script>
</body>
</html>
