<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@700&family=Roboto:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-comando: #2e7d32;
            --marrom-voltar: #3e2723;
            --bege-menu: rgba(255, 253, 231, 0.98);
            --amarelo-ativo: #ffeb3b;
            --branco: #ffffff;
            --vermelho-erro: #d32f2f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; font-family: 'Special Elite', serif; background: #1a1a1a; overflow: hidden; }

        /* Estutura de Telas */
        .cenario { 
            width: 100vw; height: 100vh; 
            background-size: cover; background-position: center; 
            display: flex; align-items: center; justify-content: center; 
        }

        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        .menu-bege {
            background: var(--bege-menu); border: 2px solid var(--marrom-voltar); 
            padding: 25px; width: 88%; max-width: 380px; text-align: center; 
            box-shadow: 10px 10px 0px var(--marrom-voltar); position: relative; z-index: 1000;
        }

        /* Tipografia */
        .titulo-app { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--verde-comando); margin-bottom: 10px; }
        h2 { font-family: 'Montserrat', sans-serif; font-size: 0.9rem; margin: 15px 0 5px 0; text-transform: uppercase; color: var(--marrom-voltar); }

        input {
            font-family: 'Roboto', sans-serif !important; width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid #ccc; background: var(--branco) !important; color: #333; text-align: center; border-radius: 4px;
        }

        /* Botões */
        .btn {
            width: 100%; padding: 15px; margin-top: 10px; font-family: 'Montserrat', sans-serif;
            font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; border-radius: 4px;
        }
        .btn-verde { background: var(--verde-comando); color: white; }
        .btn-marrom { background: var(--marrom-voltar); color: white; }
        .btn-neutro { background: var(--branco); color: #333; border: 1px solid #ccc; }
        .btn-ativo { background: var(--amarelo-ativo) !important; color: #000 !important; }

        /* Rodapé Montserrat */
        .rodape-strava {
            position: fixed; bottom: 0; width: 100%; background: white; display: flex; 
            justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--marrom-voltar); z-index: 1001;
        }
        .icon-nav { 
            text-align: center; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; 
            font-weight: bold; color: #555; text-transform: uppercase; cursor: pointer;
        }
        .icon-nav span { font-size: 1.4rem; display: block; margin-bottom: 2px; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bege-menu); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 1100; }
        .aviso-erro { color: var(--vermelho-erro); font-family: 'Roboto'; font-size: 0.7rem; font-weight: bold; margin-top: -5px; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const App = {
            el: document.getElementById('app'),
            map: null,
            userMarker: null,
            db: {
                user: { nick: "", tipo: "" },
                grupos: { qtd: 0, pessoas: 0, lideres: 0, ok: false },
                percurso: { fixos: 0, moveis: 0, ok: false }
            },

            render(html) { this.el.innerHTML = html; },

            abertura() {
                this.render(`
                    <div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000')">
                        <div class="menu-bege">
                            <h1 class="titulo-app">TrailQuest</h1>
                            <button class="btn btn-verde" onclick="App.login()">Fazer Login</button>
                            <button class="btn btn-verde" onclick="App.participante()">Continuar como Participante</button>
                        </div>
                    </div>
                `);
            },

            login() {
                this.render(`
                    <div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000')">
                        <div class="menu-bege">
                            <h2>Login</h2>
                            <input type="email" id="email" placeholder="EMAIL" oninput="App.validaLogin()">
                            <input type="password" id="senha" placeholder="SENHA" oninput="App.validaLogin()">
                            <button id="btn-l" class="btn btn-neutro" onclick="App.askNick('org')">Continuar</button>
                            <button class="btn btn-marrom" onclick="App.abertura()">Voltar</button>
                            <div id="nick-ov" class="overlay hidden">
                                <h2>Nome de Usuário</h2>
                                <input type="text" id="nick-in" placeholder="Nickname">
                                <button class="btn btn-verde" onclick="App.saveUser()">Salvar</button>
                            </div>
                        </div>
                    </div>
                `);
            },

            participante() {
                this.render(`
                    <div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000')">
                        <div class="menu-bege">
                            <h2>Código de Acesso</h2>
                            <input type="text" id="cod" placeholder="Digite o Código" oninput="App.validaPart()">
                            <button id="btn-p" class="btn btn-neutro" onclick="App.askNick('part')">Continuar</button>
                            <button class="btn btn-marrom" onclick="App.abertura()">Voltar</button>
                            <div id="nick-ov" class="overlay hidden">
                                <h2>Nome de Usuário</h2>
                                <input type="text" id="nick-in" placeholder="Nickname">
                                <button class="btn btn-verde" onclick="App.saveUser()">Salvar</button>
                            </div>
                        </div>
                    </div>
                `);
            },

            home() {
                this.render(`
                    <div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000')">
                        <div class="menu-bege">
                            <h1 class="titulo-app" style="font-size:2rem">Olá, ${this.db.user.nick}</h1>
                            <button class="btn btn-verde" onclick="App.comando()">Organizador</button>
                            <button class="btn btn-verde" onclick="alert('Área do Participante em breve')">Participante</button>
                        </div>
                    </div>
                `);
            },

            comando() {
                this.render(`
                    <div id="map"></div>
                    <div class="rodape-strava">
                        <div class="icon-nav" onclick="App.home()"><span>🏠</span>Início</div>
                        <div class="icon-nav" onclick="App.mestre()"><span>🗺️</span>Mapas</div>
                        <div class="icon-nav" style="opacity:0.3"><span>⚪</span>Começar</div>
                        <div class="icon-nav" style="opacity:0.3"><span>🔺</span>Grupos</div>
                        <div class="icon-nav" style="opacity:0.3"><span>👤</span>Você</div>
                    </div>
                `);
                this.initMap();
            },

            initMap() {
                this.map = L.map('map').setView([-23.55, -46.63], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(this.map);
                this.map.locate({setView: true, maxZoom: 16, watch: true});
                this.map.on('locationfound', (e) => {
                    if (this.userMarker) this.userMarker.setLatLng(e.latlng);
                    else this.userMarker = L.circleMarker(e.latlng, {color: 'blue', radius: 8}).addTo(this.map);
                });
            },

            mestre() {
                const liberado = this.db.grupos.ok && this.db.percurso.ok;
                this.render(`
                    <div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000')">
                        <div class="menu-bege">
                            <h2>Página Mestre</h2>
                            <button class="btn btn-verde" onclick="App.telaGrupos()">Organizar Grupos</button>
                            <button class="btn btn-verde" onclick="App.telaPercursos()">Organizar Percursos</button>
                            <button class="btn ${liberado ? 'btn-ativo' : ''}" style="margin-top:20px" onclick="${liberado ? 'alert(\'Etapa 4: Gerando Códigos...\')' : ''}">Continuar</button>
                            <button class="btn btn-marrom" onclick="App.comando()">Voltar ao Mapa</button>
                        </div>
                    </div>
                `);
            },

            telaGrupos() {
                this.render(`
                    <div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000')">
                        <div class="menu-bege">
                            <h2>Número de Grupos</h2>
                            <input type="number" id="ig1" value="${this.db.grupos.qtd || ''}" placeholder="1 a 30" oninput="App.checkRegrasG()">
                            <div id="sg2" class="${this.db.grupos.qtd ? '' : 'hidden'}">
                                <h2>Pessoas por Grupo</h2>
                                <input type="number" id="ig2" value="${this.db.grupos.pessoas || ''}" oninput="App.checkRegrasG()">
                            </div>
                            <div id="sg4" class="${this.db.grupos.pessoas ? '' : 'hidden'}">
                                <input type="text" placeholder="Campo Opcional">
                                <h2>Líderes por Grupo</h2>
                                <input type="number" id="ig4" value="${this.db.grupos.lideres || ''}" oninput="App.checkRegrasG()">
                                <div id="erro-lider" class="aviso-erro">O n° de líderes não pode ser maior que o de pessoas!</div>
                                <button id="btn-g-ok" class="btn btn-neutro" onclick="App.saveG()">Confirmar</button>
                            </div>
                            <button class="btn btn-marrom" style="margin-top:10px" onclick="App.mestre()">Voltar</button>
                        </div>
                    </div>
                `);
            },

            telaPercursos() {
                this.render(`
                    <div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000')">
                        <div class="menu-bege">
                            <h2>Objetivos Fixos</h2>
                            <input type="number" id="ip1" value="${this.db.percurso.fixos || ''}" oninput="App.checkRegrasP()">
                            <div id="sp2" class="${this.db.percurso.fixos ? '' : 'hidden'}">
                                <h2>Objetivos Móveis</h2>
                                <input type="number" id="ip2" value="${this.db.percurso.moveis || ''}" oninput="App.checkRegrasP()">
                                <button id="btn-p-ok" class="btn btn-neutro" onclick="App.saveP()">Confirmar</button>
                            </div>
                            <button class="btn btn-marrom" style="margin-top:10px" onclick="App.mestre()">Voltar</button>
                        </div>
                    </div>
                `);
            },

            // Lógicas de Validação
            validaLogin() {
                const b = document.getElementById('btn-l');
                if(document.getElementById('email').value && document.getElementById('senha').value) b.classList.add('btn-ativo');
                else b.classList.remove('btn-ativo');
            },
            validaPart() {
                const b = document.getElementById('btn-p');
                if(document.getElementById('cod').value) b.classList.add('btn-ativo');
                else b.classList.remove('btn-ativo');
            },
            askNick(tipo) { this.db.user.tipo = tipo; document.getElementById('nick-ov').classList.remove('hidden'); },
            saveUser() { this.db.user.nick = document.getElementById('nick-in').value; this.home(); },
            
            checkRegrasG() {
                const g1 = parseInt(document.getElementById('ig1').value) || 0;
                const g2 = parseInt(document.getElementById('ig2').value) || 0;
                const g4 = parseInt(document.getElementById('ig4').value) || 0;
                const erro = document.getElementById('erro-lider');
                const btn = document.getElementById('btn-g-ok');

                if(g1 >= 1 && g1 <= 30) document.getElementById('sg2').classList.remove('hidden');
                if(g2 >= 1) document.getElementById('sg4').classList.remove('hidden');

                if(g4 > g2) { erro.style.display = "block"; btn.classList.add('hidden'); }
                else { 
                    erro.style.display = "none"; 
                    if(g1 > 0 && g2 > 0) { btn.classList.remove('hidden'); btn.classList.add('btn-ativo'); }
                }
            },
            saveG() { 
                this.db.grupos.qtd = document.getElementById('ig1').value;
                this.db.grupos.pessoas = document.getElementById('ig2').value;
                this.db.grupos.lideres = document.getElementById('ig4').value;
                this.db.grupos.ok = true; this.mestre(); 
            },
            checkRegrasP() {
                const p1 = parseInt(document.getElementById('ip1').value);
                if(p1 >= 1) { document.getElementById('sp2').classList.remove('hidden'); document.getElementById('btn-p-ok').classList.add('btn-ativo'); }
            },
            saveP() { 
                this.db.percurso.fixos = document.getElementById('ip1').value;
                this.db.percurso.moveis = document.getElementById('ip2').value;
                this.db.percurso.ok = true; this.mestre(); 
            }
        };

        window.onload = () => App.abertura();
    </script>
</body>
</html>
