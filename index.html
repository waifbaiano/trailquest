<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Satisfy&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar" id="main-top-bar">
        <div class="menu-dots" onclick="toggleDrop()">⋮</div>
        <div id="myDrop" class="dropdown-menu">
            <button onclick="showS('screen-start')">SAIR</button>
        </div>
    </div>

    <div id="screen-start" class="screen start-bg" style="display:flex">
        <div class="vintage-box">
            <h1>TrailQuest</h1>
            <button class="btn-f" onclick="showS('screen-login')">Mestre</button>
        </div>
    </div>

    <div id="screen-login" class="screen start-bg">
        <div class="vintage-box">
            <input type="password" placeholder="Senha">
            <button class="btn-f" onclick="showS('screen-main-menu')">Entrar</button>
        </div>
    </div>

    <div id="screen-main-menu" class="screen bg-paper">
        <div class="vintage-box">
            <button class="btn-f" onclick="showS('screen-objectives')">Objetivos</button>
            <button id="btn-final" class="btn-inativo" disabled onclick="showS('screen-final-pin')">Gerar Código</button>
        </div>
    </div>

    <div id="screen-objectives" class="screen bg-paper">
        <div class="vintage-box">
            <input type="number" id="f-count" placeholder="Qtd Objetivos">
            <button class="btn-f" onclick="showS('screen-map-config')">Configurar Mapa</button>
        </div>
    </div>

    <div id="screen-map-config" class="screen">
        <div class="map-wrapper" id="wrapper">
            <div id="map-container">
                <img id="m-img">
                <svg id="map-svg"></svg>
                <div id="m-layer"></div>
            </div>
        </div>
        
        <div id="m-opts" class="marker-menu">
            <button onclick="oRen()">Nomear</button>
            <button onclick="oQR()">QR Code</button>
            <button onclick="oDel()" class="btn-delete">Excluir</button>
        </div>

        <div id="up-p" class="vintage-box" style="position:absolute;">
            <h3>Upload Mapa</h3>
            <input type="file" id="map-upload" accept="image/*">
        </div>

        <div id="m-foot" class="map-footer" style="display:none">
            <div id="btn-add" class="btn-f" onclick="tAdd()">ADICIONAR OBJETIVOS</div>
            <button class="btn-f" style="background:#3e2723" onclick="fMap()">SALVAR</button>
        </div>
    </div>

    <div id="screen-final-pin" class="screen start-bg">
        <div class="vintage-box"><h1>882 190</h1><button class="btn-f" onclick="showS('screen-main-menu')">OK</button></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
