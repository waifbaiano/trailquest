<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Satisfy&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            height: 100%; width: 100%;
            background-color: #1a1a1a;
            font-family: 'Special Elite', serif;
            overflow: hidden;
        }

        /* MENU SUPERIOR */
        .top-bar { position: fixed; top: 15px; right: 15px; z-index: 100; display: none; }
        .menu-dots {
            font-size: 30px; color: #3e2723; cursor: pointer;
            background: rgba(245, 245, 220, 0.9);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .dropdown-menu {
            position: absolute; top: 55px; right: 0;
            background: #f5f5dc; border: 2px solid #3e2723;
            border-radius: 8px; display: none; width: 130px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .dropdown-menu button { background: none; color: #3e2723; padding: 12px; width: 100%; border: none; font-size: 1rem; cursor: pointer; }

        .screen {
            display: none; width: 100vw; height: 100vh;
            position: fixed; top: 0; left: 0;
            flex-direction: column; justify-content: center; align-items: center;
            background-size: cover; background-position: center;
        }

        .start-bg { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1350'); }
        .bg-paper { background-image: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=1350'); }

        .vintage-box {
            background: rgba(245, 245, 220, 0.98);
            border: 5px solid #3e2723;
            padding: 25px; width: 90%; max-width: 360px;
            border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            text-align: center; max-height: 90vh; overflow-y: auto;
        }

        /* MAPA */
        #screen-map-config { background: #000; }
        .map-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #map-container { position: relative; display: inline-block; transition: transform 0.2s ease-out; cursor: crosshair; }
        #map-img { display: block; max-width: 90vw; max-height: 80vh; pointer-events: none; }
        .marker {
            position: absolute; width: 34px; height: 34px;
            background: #d32f2f; border: 2px solid #fff; color: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transform: translate(-50%, -50%); font-weight: bold; font-size: 14px;
        }

        .logo-font { font-family: 'Permanent Marker', cursive; color: #2e7d32; font-size: 2.2rem; margin-bottom: 5px; }
        .handwritten { font-family: 'Satisfy', cursive; color: #5d4037; font-size: 1.5rem; margin-bottom: 20px; }
        .label-small { font-size: 0.8rem; display: block; text-align: left; margin: 10px 0 5px 0; color: #3e2723; font-weight: bold; }

        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #8d6e63; border-radius: 8px; font-family: 'Special Elite'; font-size: 1rem; }
        button { width: 100%; padding: 15px; margin-top: 8px; border: none; border-radius: 8px; font-family: 'Special Elite'; font-weight: bold; text-transform: uppercase; cursor: pointer; }
        .btn-vintage { background: #3e2723; color: #f5f5dc; }
        .btn-vintage-alt { background: #2e7d32; color: white; }
        .btn-inactive { background: #ccc !important; color: #666 !important; cursor: not-allowed; }
        .active-green { background: #2e7d32 !important; color: white !important; }
        .back-link { background: none; color: #3e2723; text-decoration: underline; font-size: 0.8rem; margin-top: 15px; }
        
        .map-controls { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; z-index: 110; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <div class="top-bar" id="main-top-bar">
        <div class="menu-dots" onclick="toggleDropdown()">⋮</div>
        <div class="dropdown-menu" id="myDropdown">
            <button onclick="sairLogin()">Sair</button>
        </div>
    </div>

    <div id="screen-start" class="screen start-bg" style="display: flex;">
        <div class="vintage-box">
            <h1 class="logo-font">TrailQuest</h1>
            <p class="handwritten">Sua jornada começa aqui</p>
            <button class="btn-vintage" onclick="showScreen('screen-login')">Fazer Login</button>
            <button class="btn-vintage-alt" onclick="showScreen('screen-pin')">Participante</button>
        </div>
    </div>

    <div id="screen-login" class="screen start-bg">
        <div class="vintage-box">
            <h2 class="handwritten">Mestre da Trilha</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-vintage" onclick="loginMestre()">Entrar</button>
            <button class="back-link" onclick="sairLogin()">Voltar</button>
        </div>
    </div>

    <div id="screen-pin" class="screen start-bg">
        <div class="vintage-box">
            <h2 class="handwritten">Código da Trilha</h2>
            <input type="number" id="input-pin" placeholder="000000" oninput="checkPIN(this.value)">
            <button class="back-link" onclick="showScreen('screen-start')">Voltar</button>
        </div>
    </div>

    <div id="screen-main-menu" class="screen bg-paper">
        <div class="vintage-box">
            <h2 class="logo-font">Menu Mestre</h2>
            <button class="btn-vintage" onclick="showScreen('screen-objectives')">Objetivos</button>
            <button class="btn-vintage" onclick="showScreen('screen-groups')">Grupos</button>
        </div>
    </div>

    <div id="screen-objectives" class="screen bg-paper">
        <div class="vintage-box">
            <h3 class="handwritten">Missão</h3>
            <label class="label-small">Qtd. Objetivos Fixos:</label>
            <input type="number" id="fixed-count" placeholder="0" oninput="checkObjectives()">
            <label class="label-small">Qtd. Objetivos Móveis:</label>
            <input type="number" id="mobile-count" placeholder="0">
            <button id="btn-map" class="btn-inactive" disabled onclick="showScreen('screen-map-config')">Configurar Mapa</button>
            <button class="back-link" onclick="showScreen('screen-main-menu')">Voltar</button>
        </div>
    </div>

    <div id="screen-groups" class="screen bg-paper">
        <div class="vintage-box">
            <h3 class="handwritten">Equipes</h3>
            
            <label class="label-small">Número de Grupos:</label>
            <input type="number" id="group-qty" placeholder="Ex: 4" oninput="logicGroups()">

            <div id="area-people" style="display:none; margin-top:10px;">
                <div id="people-inputs-container">
                    </div>
            </div>

            <div id="area-leaders" style="display:none; margin-top:10px;">
                <label class="label-small">Quantidade de líderes por grupo:</label>
                <input type="number" id="leaders-qty" placeholder="Ex: 1" oninput="validateFinalGroups()">
            </div>

            <button id="btn-save-groups" class="btn-inactive" disabled onclick="saveGroupsFinal()">Confirmar Equipes</button>
            <button class="back-link" onclick="showScreen('screen-main-menu')">Voltar</button>
        </div>
    </div>

    <div id="screen-map-config" class="screen">
        <div class="map-wrapper">
            <div id="map-container" onclick="addMarker(event)">
                <img id="map-img" src="" alt="Mapa">
                <div id="markers-layer"></div>
            </div>
        </div>
        <div id="upload-panel" class="vintage-box" style="position:absolute; z-index:120;">
            <h3 class="handwritten">Mapa da Trilha</h3>
            <input type="file" id="map-upload" accept="image/*" onchange="handleMapUpload(event)">
            <button class="back-link" onclick="showScreen('screen-objectives')">Cancelar</button>
        </div>
        <div id="map-editor-controls" class="map-controls" style="display:none;">
            <button class="btn-vintage" style="flex:1" onclick="zoomMap(1.2)">+</button>
            <button class="btn-vintage" style="flex:1" onclick="zoomMap(0.8)">-</button>
            <button id="btn-done-map" class="btn-vintage-alt" style="flex:2" onclick="showScreen('screen-main-menu')">OK</button>
        </div>
    </div>

    <script>
        let currentScale = 1;
        let markers = [];

        function toggleDropdown() {
            const d = document.getElementById("myDropdown");
            d.style.display = d.style.display === "block" ? "none" : "block";
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            document.getElementById('main-top-bar').style.display = 
                (id !== 'screen-start' && id !== 'screen-login' && id !== 'screen-pin' && id !== 'screen-map-config') ? 'block' : 'none';
            document.getElementById("myDropdown").style.display = "none";
        }

        function sairLogin() {
            document.getElementById('login-email').value = "";
            document.getElementById('login-pass').value = "";
            showScreen('screen-start');
        }

        function loginMestre() { showScreen('screen-main-menu'); }

        function checkObjectives() {
            const val = document.getElementById('fixed-count').value;
            const btn = document.getElementById('btn-map');
            btn.disabled = val <= 0;
            btn.className = val > 0 ? 'btn-vintage-alt active-green' : 'btn-inactive';
        }

        // --- LÓGICA DE GRUPOS REORGANIZADA ---

        function logicGroups() {
            const qty = parseInt(document.getElementById('group-qty').value);
            const areaPeople = document.getElementById('area-people');
            const container = document.getElementById('people-inputs-container');
            const areaLeaders = document.getElementById('area-leaders');
            
            if(qty >= 3) {
                areaPeople.style.display = 'block';
                container.innerHTML = ""; // Limpa campos anteriores

                if(qty % 2 === 0) {
                    // Par: Apenas um campo
                    container.innerHTML = `
                        <label class="label-small">Número de pessoas por grupo:</label>
                        <input type="number" class="people-field" placeholder="Ex: 5" oninput="logicLeadersDisplay()">
                    `;
                } else {
                    // Ímpar: Dois campos (o momento do grupo ímpar)
                    container.innerHTML = `
                        <label class="label-small">Número de pessoas nos grupos pares:</label>
                        <input type="number" class="people-field" placeholder="Ex: 5" oninput="logicLeadersDisplay()">
                        <label class="label-small">Número de pessoas no grupo ímpar:</label>
                        <input type="number" class="people-field" placeholder="Ex: 4 ou 6" oninput="logicLeadersDisplay()">
                    `;
                }
            } else {
                areaPeople.style.display = 'none';
                areaLeaders.style.display = 'none';
            }
            validateFinalGroups();
        }

        function logicLeadersDisplay() {
            const fields = document.querySelectorAll('.people-field');
            const areaLeaders = document.getElementById('area-leaders');
            let allFilled = true;

            fields.forEach(f => {
                if(!f.value || parseInt(f.value) <= 1) allFilled = false;
            });

            if(allFilled && fields.length > 0) {
                areaLeaders.style.display = 'block';
            } else {
                areaLeaders.style.display = 'none';
            }
            validateFinalGroups();
        }

        function validateFinalGroups() {
            const qty = document.getElementById('group-qty').value;
            const leaders = document.getElementById('leaders-qty').value;
            const areaLeadersVisible = document.getElementById('area-leaders').style.display === 'block';
            const btn = document.getElementById('btn-save-groups');

            if (qty >= 3 && areaLeadersVisible && leaders > 0) {
                btn.disabled = false;
                btn.className = 'btn-vintage-alt active-green';
            } else {
                btn.disabled = true;
                btn.className = 'btn-inactive';
            }
        }

        function saveGroupsFinal() {
            alert("Configuração salva com sucesso!");
            showScreen('screen-main-menu');
        }

        // --- MAPA ---
        function handleMapUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = document.getElementById('map-img');
                img.src = e.target.result;
                img.onload = function() {
                    document.getElementById('upload-panel').style.display = 'none';
                    document.getElementById('map-editor-controls').style.display = 'flex';
                    currentScale = 1;
                    document.getElementById('map-container').style.transform = `scale(1)`;
                }
            }
            reader.readAsDataURL(file);
        }

        function zoomMap(factor) {
            currentScale *= factor;
            document.getElementById('map-container').style.transform = `scale(${currentScale})`;
        }

        function addMarker(e) {
            const container = document.getElementById('map-container');
            const rect = container.getBoundingClientRect();
            const x = (e.clientX - rect.left) / currentScale;
            const y = (e.clientY - rect.top) / currentScale;
            const index = markers.findIndex(m => Math.hypot(m.x - x, m.y - y) < (20 / currentScale));
            if(index > -1) markers.splice(index, 1);
            else {
                const limit = document.getElementById('fixed-count').value || 99;
                if(markers.length < limit) markers.push({x, y});
            }
            renderMarkers();
        }

        function renderMarkers() {
            const layer = document.getElementById('markers-layer');
            layer.innerHTML = "";
            markers.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'marker';
                div.style.left = m.x + "px"; div.style.top = m.y + "px";
                div.innerText = i + 1;
                layer.appendChild(div);
            });
        }

        function checkPIN(v) { if(v === "123456") alert("PIN Correto!"); }
    </script>
</body>
</html>
