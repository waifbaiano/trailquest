<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest OMNI-SERVER | Final Surgery Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@300;500;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        :root {
            --hex-primary: #1b5e20;
            --hex-accent: #ffab00;
            --hex-bg: #fdfdf5;
            --hex-dark: #1a1a1a;
            --hex-border: #2e1a16;
            --shadow-tactical: 10px 10px 0px #2e1a16;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; font-family: 'Roboto Mono', monospace; overflow: hidden; }

        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        .ui-master-layer { position: absolute; top:0; left:0; width:100%; height:100%; z-index: 10; pointer-events: none; }
        .ui-master-layer * { pointer-events: auto; }

        .window-frame {
            background: var(--hex-bg); border: 3px solid var(--hex-border);
            padding: 25px; width: 92%; max-width: 440px; margin: auto;
            box-shadow: var(--shadow-tactical); position: relative;
            max-height: 85vh; overflow-y: auto;
        }

        .overlay-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 2000; display: flex; align-items: center; justify-content: center;
        }

        h1 { font-family: 'Special Elite', serif; color: var(--hex-primary); font-size: 2.8rem; text-align: center; margin-bottom: 5px; }
        h2 { font-family: 'Montserrat'; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; color: #444; border-bottom: 2px solid var(--hex-primary); margin: 15px 0 10px; padding-bottom: 5px; }
        
        .tq-input { width: 100%; padding: 14px; margin-bottom: 12px; border: 2px solid #ccc; background: #fff; font-family: inherit; font-size: 0.9rem; }
        
        .tq-btn { width: 100%; padding: 18px; border: none; font-family: 'Montserrat'; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-green { background: var(--hex-primary); color: white; }
        .btn-gold { background: var(--hex-accent); color: #000; }
        .btn-cancel { background: #333; color: #eee; }

        .bottom-bar {
            position: fixed; bottom: 0; width: 100%; background: #fff;
            border-top: 3px solid var(--hex-border); display: flex;
            justify-content: space-around; padding: 10px 0 25px; z-index: 1000;
        }
        .nav-link { text-align: center; color: #777; font-family: 'Montserrat'; font-size: 0.6rem; font-weight: 700; flex: 1; }
        .nav-link span { font-size: 1.5rem; display: block; }
        .nav-link.active { color: var(--hex-primary); }
        .btn-continue-nav { background: var(--hex-primary); color: white; border-radius: 50px; padding: 10px; transform: translateY(-15px); box-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        .edit-hud { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 90%; background: var(--hex-bg); border: 2px solid var(--hex-border); padding: 15px; z-index: 1001; box-shadow: var(--shadow-tactical); }
        .pin-tactical { background: var(--hex-primary); color: white; border: 2px solid white; border-radius: 50%; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; font-weight: 900; }

        /* Gráficos e Calendário */
        .chart-bar { background: var(--hex-primary); width: 12%; border-radius: 2px 2px 0 0; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .cal-day { background: white; border: 1px solid #ddd; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.6rem; border-radius: 50%; position: relative; }
        .cal-fire::after { content: '🔥'; position: absolute; top: -5px; font-size: 0.8rem; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="app-mount"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const TrailQuest = {
            state: {
                user: { nick: '', type: 'GUEST' },
                config: { groups: 0, ppx: 0, leaders: 0, fix: 0, mov: 0, extra: '', status: false },
                mapSlots: [null, null, null, null, null],
                points: [],
                connectedUsers: [], 
                activeSlot: 0,
                editMode: false,
                currentCode: null,
                targetPoint: null
            },

            map: null,
            markers: [],

            init() { this.renderSplash(); },

            render(html) { document.getElementById('app-mount').innerHTML = html; },

            renderSplash() {
                this.render(`
                    <div class="overlay-screen" style="background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000') center/cover">
                        <div class="window-frame">
                            <h1>TrailQuest</h1>
                            <button class="tq-btn btn-green" onclick="TrailQuest.goLogin()">Acesso Organizador</button>
                            <button class="tq-btn btn-green" onclick="TrailQuest.goJoin()">Código Participante</button>
                        </div>
                    </div>
                `);
            },

            goLogin() {
                this.render(`
                    <div class="overlay-screen">
                        <div class="window-frame">
                            <h2>Autenticação</h2>
                            <input type="email" class="tq-input" placeholder="">
                            <input type="password" id="adm-pass" class="tq-input" placeholder="">
                            <button class="tq-btn btn-green" onclick="TrailQuest.goNick()">Entrar</button>
                            <button class="tq-btn btn-cancel" onclick="TrailQuest.renderSplash()">Voltar</button>
                        </div>
                    </div>
                `);
            },

            goJoin() {
                this.render(`
                    <div class="overlay-screen">
                        <div class="window-frame">
                            <h2>Validar Código</h2>
                            <input type="text" class="tq-input" placeholder="">
                            <button class="tq-btn btn-gold" onclick="TrailQuest.goNick()">Entrar na Missão</button>
                            <button class="tq-btn btn-cancel" onclick="TrailQuest.renderSplash()">Voltar</button>
                        </div>
                    </div>
                `);
            },

            goNick() {
                this.render(`
                    <div class="overlay-screen">
                        <div class="window-frame">
                            <h2>Identificação</h2>
                            <input type="text" id="user-nick" class="tq-input" placeholder="">
                            <button class="tq-btn btn-green" onclick="TrailQuest.saveUser()">Salvar Perfil</button>
                            <button class="tq-btn btn-cancel" onclick="TrailQuest.goDashboard()">Voltar</button>
                        </div>
                    </div>
                `);
            },

            saveUser() {
                this.state.user.nick = document.getElementById('user-nick').value || 'Explorer';
                this.goDashboard();
            },

            goDashboard() {
                this.state.editMode = false;
                this.render(`
                    <div class="ui-master-layer"><div id="hud-top"></div></div>
                    <nav class="bottom-bar">
                        <div class="nav-link active" onclick="TrailQuest.goDashboard()"><span>🏠</span>Home</div>
                        <div class="nav-link" onclick="TrailQuest.goConfig()"><span>⚙️</span>Ajustes</div>
                        <div class="nav-link btn-continue-nav" onclick="TrailQuest.finalizeMap()"><span>➡️</span></div>
                        <div class="nav-link" onclick="TrailQuest.goRadar()"><span>📡</span>Radar</div>
                        <div class="nav-link" onclick="TrailQuest.goProfile()"><span>👤</span>Perfil</div>
                    </nav>
                `);
                this.initMap();
            },

            initMap() {
                if(this.map) return;
                this.map = L.map('map', { zoomControl: false }).setView([-23.5, -46.6], 12);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(this.map);
                this.map.on('click', (e) => { if(this.state.editMode) this.dropPoint(e.latlng); });
            },

            goConfig() {
                this.render(`
                    <div class="overlay-screen">
                        <div class="window-frame">
                            <h1>Configuração</h1>
                            <h2>Grupos</h2>
                            <div style="display:flex; gap:10px">
                                <input type="number" id="c-groups" class="tq-input" placeholder="">
                                <input type="number" id="c-leaders" class="tq-input" placeholder="">
                            </div>
                            <input type="number" id="c-ppx" class="tq-input" placeholder="">
                            <h2>Percurso</h2>
                            <div style="display:flex; gap:10px">
                                <input type="number" id="c-fix" class="tq-input" placeholder="">
                                <input type="number" id="c-mov" class="tq-input" placeholder="">
                            </div>
                            <h2>Info Adicional</h2>
                            <input type="text" id="c-extra" class="tq-input" placeholder="">
                            <button class="tq-btn btn-gold" onclick="TrailQuest.saveSetup()">Configurar e Editar Mapa</button>
                            <button class="tq-btn btn-cancel" onclick="TrailQuest.goDashboard()">Voltar</button>
                        </div>
                    </div>
                `);
            },

            saveSetup() {
                this.state.config = {
                    groups: document.getElementById('c-groups').value,
                    leaders: document.getElementById('c-leaders').value,
                    ppx: document.getElementById('c-ppx').value,
                    fix: document.getElementById('c-fix').value,
                    mov: document.getElementById('c-mov').value,
                    extra: document.getElementById('c-extra').value,
                    status: true
                };
                this.startMapEditor();
            },

            startMapEditor() {
                this.state.editMode = true;
                this.state.points = this.state.mapSlots[this.state.activeSlot]?.points || [];
                this.goDashboard();
                this.updateEditHUD();
                this.refreshMarkers();
            },

            updateEditHUD() {
                const hud = document.getElementById('hud-top');
                const p = this.state.targetPoint !== null ? this.state.points[this.state.targetPoint] : null;
                hud.innerHTML = `
                    <div class="edit-hud">
                        ${p ? `
                            <b>Ponto ${this.state.targetPoint + 1}</b>
                            <input type="text" id="p-label" class="tq-input" style="margin-top:10px" placeholder="">
                            <div style="display:flex; gap:5px">
                                <button class="tq-btn btn-green" style="padding:10px; margin:0" onclick="TrailQuest.savePointLabel()">OK</button>
                                <button class="tq-btn btn-cancel" style="padding:10px; margin:0" onclick="TrailQuest.deletePoint()">Excluir</button>
                            </div>
                        ` : `
                            <div style="display:flex; justify-content:space-between; align-items:center">
                                <b>Slot ${this.state.activeSlot + 1}</b>
                                <button class="tq-btn btn-green" style="font-size:0.6rem; padding:8px; width:auto; margin:0" onclick="TrailQuest.openSlotMenu()">Selecionar Slot</button>
                            </div>
                        `}
                    </div>
                `;
            },

            openSlotMenu() {
                this.render(`
                    <div class="overlay-screen">
                        <div class="window-frame">
                            <h2>Slots de Mapa</h2>
                            ${this.state.mapSlots.map((s, i) => `
                                <div style="background:white; padding:15px; border:1px solid #ddd; margin-bottom:10px" onclick="TrailQuest.selectSlot(${i})">
                                    Mapa Auxiliar ${i+1} ${s ? '(ATIVO)' : ''}
                                </div>
                            `).join('')}
                            <button class="tq-btn btn-cancel" onclick="TrailQuest.goDashboard(); TrailQuest.updateEditHUD();">Voltar</button>
                        </div>
                    </div>
                `);
            },

            selectSlot(i) {
                this.state.mapSlots[this.state.activeSlot] = { points: [...this.state.points] };
                this.state.activeSlot = i;
                this.state.points = this.state.mapSlots[i]?.points || [];
                this.goDashboard();
                this.updateEditHUD();
                this.refreshMarkers();
            },

            dropPoint(latlng) {
                if(this.state.points.length >= this.state.config.fix) return;
                this.state.points.push({ latlng, name: '' });
                this.refreshMarkers();
                this.updateEditHUD();
            },

            refreshMarkers() {
                this.markers.forEach(m => this.map.removeLayer(m));
                this.markers = [];
                this.state.points.forEach((p, i) => {
                    const m = L.marker(p.latlng, { icon: L.divIcon({ className: '', html: `<div class="pin-tactical">${i+1}</div>`, iconSize: [32,32] }) }).addTo(this.map).on('click', (e) => {
                        L.DomEvent.stopPropagation(e);
                        this.state.targetPoint = i;
                        this.updateEditHUD();
                    });
                    this.markers.push(m);
                });
            },

            savePointLabel() {
                this.state.points[this.state.targetPoint].name = document.getElementById('p-label').value;
                this.state.targetPoint = null;
                this.updateEditHUD();
            },

            deletePoint() {
                this.state.points.splice(this.state.targetPoint, 1);
                this.state.targetPoint = null;
                this.refreshMarkers();
                this.updateEditHUD();
            },

            finalizeMap() {
                this.state.currentCode = Math.floor(100000 + Math.random() * 900000);
                this.render(`
                    <div class="overlay-screen">
                        <div class="window-frame" style="text-align:center">
                            <h1>CÓDIGO</h1>
                            <div style="background:white; border:2px dashed var(--hex-primary); padding:20px; font-size:3rem; font-weight:900; letter-spacing:10px">
                                ${this.state.currentCode}
                            </div>
                            <button class="tq-btn btn-green" onclick="TrailQuest.goDashboard()">Voltar ao Comando</button>
                        </div>
                    </div>
                `);
            },

            goRadar() {
                this.render(`
                    <div class="overlay-screen">
                        <div class="window-frame">
                            <h2>Radar de Sinal</h2>
                            <div id="radar-list">
                                ${this.state.connectedUsers.length === 0 ? 
                                    '<p style="text-align:center; opacity:0.5; margin:20px">Aguardando conexões...</p>' : 
                                    this.state.connectedUsers.map(u => `<div style="padding:10px; background:white; margin:5px 0">👤 ${u.name}</div>`).join('')
                                }
                            </div>
                            <button class="tq-btn btn-cancel" onclick="TrailQuest.goDashboard()">Voltar</button>
                        </div>
                    </div>
                `);
            },

            goProfile() {
                this.render(`
                    <div class="overlay-screen">
                        <div class="window-frame">
                            <h2 style="border:0">${this.state.user.nick}</h2>
                            <button class="tq-btn btn-gold" style="padding:8px; font-size:0.7rem" onclick="TrailQuest.goNick()">Alterar Identidade</button>
                            
                            <h2>Desempenho</h2>
                            <div style="background:#eee; height:80px; display:flex; align-items:flex-end; padding:10px; gap:5px; margin-bottom:15px">
                                <div class="chart-bar" style="height:40%"></div>
                                <div class="chart-bar" style="height:70%"></div>
                                <div class="chart-bar" style="height:50%"></div>
                                <div class="chart-bar" style="height:90%"></div>
                                <div class="chart-bar" style="height:30%"></div>
                            </div>

                            <h2>Calendário</h2>
                            <div class="cal-grid">
                                ${Array.from({length: 28}, (_, i) => `
                                    <div class="cal-day ${[3,12,25].includes(i+1) ? 'cal-fire' : ''}">${i+1}</div>
                                `).join('')}
                            </div>

                            <button class="tq-btn btn-cancel" style="margin-top:20px" onclick="TrailQuest.goDashboard()">Voltar</button>
                        </div>
                    </div>
                `);
            }
        };

        window.onload = () => TrailQuest.init();
    </script>
</body>
</html>
