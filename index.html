<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Satisfy&family=Special+Elite&display=swap" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html {
            height: 100%; width: 100%;
            background-color: #1a1a1a;
            font-family: 'Special Elite', serif;
            overflow: hidden;
        }

        /* MENU SUPERIOR */
        .top-bar { position: fixed; top: 15px; right: 15px; z-index: 100; display: none; }
        .menu-dots {
            font-size: 30px; color: #3e2723; cursor: pointer;
            background: rgba(245, 245, 220, 0.9);
            width: 45px; height: 45px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        .dropdown-menu {
            position: absolute; top: 55px; right: 0;
            background: #f5f5dc; border: 2px solid #3e2723;
            border-radius: 8px; display: none; width: 160px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .dropdown-menu button { background: none; color: #3e2723; padding: 12px; width: 100%; border: none; font-size: 0.9rem; cursor: pointer; text-align: left; font-family: 'Special Elite'; }
        .dropdown-menu .btn-exit { color: #d32f2f; font-size: 0.7rem; border-top: 1px solid rgba(62, 39, 35, 0.2); text-align: center; font-weight: bold; }

        .screen {
            display: none; width: 100vw; height: 100vh;
            position: fixed; top: 0; left: 0;
            flex-direction: column; justify-content: center; align-items: center;
            background-size: cover; background-position: center;
        }

        .start-bg { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1350'); }
        .bg-paper { background-image: linear-gradient(rgba(255,255,255,0.3), rgba(255,255,255,0.3)), url('https://images.unsplash.com/photo-1502082553048-f009c37129b9?q=80&w=1350'); }

        .vintage-box {
            background: rgba(245, 245, 220, 0.98);
            border: 5px solid #3e2723;
            padding: 25px; width: 90%; max-width: 360px;
            border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            text-align: center; max-height: 90vh; overflow-y: auto;
        }

        /* MAPA INTERATIVO */
        #screen-map-config { background: #000; touch-action: none; }
        .map-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        #map-container { position: relative; display: inline-block; transition: transform 0.1s ease-out; cursor: grab; }
        #map-container.editing { cursor: crosshair; }
        #map-img { display: block; max-width: 200vw; max-height: 200vh; pointer-events: none; user-select: none; }
        
        #map-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }

        .marker {
            position: absolute; width: 36px; height: 36px;
            background: #d32f2f; border: 2px solid #fff; color: #fff;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            transform: translate(-50%, -50%); font-weight: bold; font-size: 14px;
            z-index: 10; cursor: move; box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            pointer-events: auto;
        }
        .marker-label {
            position: absolute; top: 40px; left: 50%; transform: translateX(-50%);
            background: rgba(62, 39, 35, 0.9); color: white; padding: 2px 8px;
            border-radius: 4px; font-size: 11px; white-space: nowrap; pointer-events: none;
            border: 1px solid #fff;
        }

        /* MENU DE OPÇÕES DO PONTO */
        .marker-menu {
            position: fixed; background: #f5f5dc; border: 3px solid #3e2723;
            border-radius: 10px; z-index: 200; display: none; width: 180px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .marker-menu button { 
            width: 100%; padding: 12px; border: none; background: none;
            font-family: 'Special Elite'; font-size: 0.9rem; text-align: left;
            border-bottom: 1px solid rgba(62, 39, 35, 0.1); cursor: pointer;
        }
        .marker-menu .btn-delete { color: #d32f2f; font-size: 0.75rem; font-weight: bold; }

        /* CONTROLES DO RODAPÉ */
        .map-footer {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 110; width: 90%; max-width: 400px; display: flex; flex-direction: column; gap: 10px;
        }
        .btn-add-mode { background: #2e7d32; color: white; padding: 15px; border-radius: 8px; font-weight: bold; text-align: center; }

        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid #8d6e63; border-radius: 8px; font-family: 'Special Elite'; }
        .btn-vintage-alt { background: #2e7d32; color: white; padding: 12px; border-radius: 8px; font-weight: bold; }
        .btn-inactive { background: #ccc !important; color: #666 !important; }
        .back-link { background: none; color: #3e2723; text-decoration: underline; font-size: 0.8rem; margin-top: 10px; border:none; cursor:pointer;}
    </style>
</head>
<body>

    <div class="top-bar" id="main-top-bar">
        <div class="menu-dots" onclick="toggleDropdown()">⋮</div>
        <div class="dropdown-menu" id="myDropdown">
            <button id="menu-mobile-reg" style="display:none;" onclick="showScreen('screen-mobile-pin')">Registrar Móvel</button>
            <button class="btn-exit" onclick="sairLogin()">SAIR</button>
        </div>
    </div>

    <div id="screen-start" class="screen start-bg" style="display: flex;">
        <div class="vintage-box">
            <h1 style="font-family:'Permanent Marker'; color:#2e7d32;">TrailQuest</h1>
            <p style="font-family:'Satisfy'; margin-bottom:20px;">Sua jornada começa aqui</p>
            <button class="btn-add-mode" style="background:#3e2723; width:100%;" onclick="showScreen('screen-login')">Fazer Login</button>
            <button class="btn-add-mode" style="width:100%; margin-top:10px;" onclick="showScreen('screen-pin')">Participante</button>
        </div>
    </div>

    <div id="screen-login" class="screen start-bg">
        <div class="vintage-box">
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button class="btn-add-mode" style="background:#3e2723; width:100%;" onclick="loginMestre()">Entrar</button>
            <button class="back-link" onclick="sairLogin()">Voltar</button>
        </div>
    </div>

    <div id="screen-pin" class="screen start-bg">
        <div class="vintage-box">
            <input type="number" id="input-pin" placeholder="PIN">
            <button class="back-link" onclick="showScreen('screen-start')">Voltar</button>
        </div>
    </div>

    <div id="screen-main-menu" class="screen bg-paper">
        <div class="vintage-box">
            <h2 style="font-family:'Permanent Marker'; margin-bottom:15px;">Menu Mestre</h2>
            <button class="btn-add-mode" style="background:#3e2723; width:100%;" onclick="showScreen('screen-objectives')">Objetivos</button>
            <button class="btn-add-mode" style="background:#3e2723; width:100%; margin-top:10px;" onclick="showScreen('screen-groups')">Grupos</button>
            <button id="btn-final-codes" class="btn-inactive" style="width:100%; margin-top:10px; border:none; padding:15px; border-radius:8px; font-family:'Special Elite'; font-weight:bold;" disabled onclick="handleFinalStep()">Gerar Códigos</button>
        </div>
    </div>

    <div id="screen-objectives" class="screen bg-paper">
        <div class="vintage-box">
            <label style="font-size:0.8rem; font-weight:bold;">Qtd. Objetivos Fixos:</label>
            <input type="number" id="fixed-count" oninput="checkObjectives()">
            <label style="font-size:0.8rem; font-weight:bold;">Qtd. Objetivos Móveis:</label>
            <input type="number" id="mobile-count" oninput="checkObjectives()">
            <button id="btn-map" class="btn-inactive" style="width:100%; border:none; padding:15px; border-radius:8px; font-family:'Special Elite'; font-weight:bold;" disabled onclick="showScreen('screen-map-config')">Configurar Mapa</button>
            <button class="back-link" onclick="showScreen('screen-main-menu')">Voltar</button>
        </div>
    </div>

    <div id="screen-groups" class="screen bg-paper">
        <div class="vintage-box">
            <input type="number" id="group-qty" placeholder="Número de Grupos" oninput="logicGroups()">
            <div id="area-people" style="display:none;">
                <input type="number" id="people-1" placeholder="Pessoas por grupo" oninput="logicPeopleHierarchy()">
                <input type="number" id="people-2" style="display:none;" oninput="logicPeopleHierarchy()">
            </div>
            <div id="area-leaders" style="display:none;">
                <input type="number" id="leaders-qty" placeholder="Líderes por grupo" oninput="validateFinalGroups()">
            </div>
            <button id="btn-save-groups" class="btn-inactive" style="width:100%; border:none; padding:15px; border-radius:8px; font-family:'Special Elite'; font-weight:bold;" disabled onclick="saveGroupsFinal()">Confirmar</button>
        </div>
    </div>

    <div id="screen-map-config" class="screen">
        <div class="map-wrapper" id="zoom-area">
            <div id="map-container">
                <img id="map-img" src="" alt="Mapa">
                <svg id="map-svg"></svg>
                <div id="markers-layer"></div>
            </div>
        </div>

        <div id="marker-options" class="marker-menu">
            <button onclick="optRename()">Nomear</button>
            <button onclick="optChangeNum()">Mudar Número</button>
            <button onclick="optQRCode()">Gerar QR Code</button>
            <button class="btn-delete" onclick="optDelete()">Excluir</button>
        </div>

        <div id="upload-panel" class="vintage-box" style="position:absolute; z-index:120;">
            <h3 style="font-family:'Satisfy'; margin-bottom:10px;">Upload do Mapa</h3>
            <input type="file" id="map-upload" accept="image/*" onchange="handleMapUpload(event)">
        </div>

        <div id="map-footer-controls" class="map-footer" style="display:none;">
            <div id="btn-add-toggle" class="btn-add-mode" onclick="toggleAddMode()">ADICIONAR OBJETIVOS</div>
            <button class="btn-add-mode" style="background:#3e2723;" onclick="finishMap()">SALVAR E SAIR</button>
        </div>
    </div>

    <div id="screen-mobile-pin" class="screen bg-paper">
        <div class="vintage-box">
            <input type="number" id="input-mobile-pin" placeholder="PIN Especial">
            <button class="btn-add-mode" style="width:100%;" onclick="showScreen('screen-final-pin')">Registrar</button>
            <button class="back-link" onclick="skipMobilePin()">Pular</button>
        </div>
    </div>

    <div id="screen-final-pin" class="screen start-bg">
        <div class="vintage-box">
            <h1 style="font-size:3rem; color:#2e7d32;">882 190</h1>
            <button class="btn-add-mode" style="background:#3e2723; width:100%;" onclick="showScreen('screen-main-menu')">Concluir</button>
        </div>
    </div>

    <script>
        let currentScale = 1;
        let markers = [];
        let isAddMode = false;
        let draggedIdx = null;
        let activeMarkerIdx = null;
        let mapReady = false, groupsReady = false;

        // Funções de Navegação
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(id).style.display = 'flex';
            document.getElementById('main-top-bar').style.display = 
                (['screen-start', 'screen-login', 'screen-pin', 'screen-map-config'].includes(id)) ? 'none' : 'block';
            document.getElementById('marker-options').style.display = 'none';
        }

        function sairLogin() { showScreen('screen-start'); }
        function loginMestre() { showScreen('screen-main-menu'); }
        function toggleDropdown() {
            const d = document.getElementById("myDropdown");
            d.style.display = d.style.display === "block" ? "none" : "block";
        }

        function checkObjectives() {
            const fixed = document.getElementById('fixed-count').value;
            const btn = document.getElementById('btn-map');
            btn.disabled = !fixed || fixed <= 0;
            btn.className = btn.disabled ? 'btn-inactive' : 'btn-add-mode';
        }

        // Lógica de Grupos
        function logicGroups() {
            const qty = parseInt(document.getElementById('group-qty').value);
            document.getElementById('area-people').style.display = qty >= 3 ? 'block' : 'none';
            validateFinalGroups();
        }
        function logicPeopleHierarchy() {
            const p1 = document.getElementById('people-1').value;
            const p2 = document.getElementById('people-2');
            p2.style.display = p1 ? 'block' : 'none';
            document.getElementById('area-leaders').style.display = (p1 >= 2 || p2.value >= 2) ? 'block' : 'none';
            validateFinalGroups();
        }
        function validateFinalGroups() {
            const qty = document.getElementById('group-qty').value;
            const ldr = document.getElementById('leaders-qty').value;
            const btn = document.getElementById('btn-save-groups');
            btn.disabled = !(qty >= 3 && ldr > 0);
            btn.className = btn.disabled ? 'btn-inactive' : 'btn-add-mode';
        }
        function saveGroupsFinal() { groupsReady = true; checkGlobalReady(); showScreen('screen-main-menu'); }

        // --- LÓGICA DO MAPA ---
        function handleMapUpload(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('map-img').src = e.target.result;
                document.getElementById('upload-panel').style.display = 'none';
                document.getElementById('map-footer-controls').style.display = 'flex';
                initMapSystem();
            };
            reader.readAsDataURL(file);
        }

        function initMapSystem() {
            const container = document.getElementById('map-container');
            
            // Clique no mapa
            container.onmousedown = (e) => {
                if(!isAddMode || e.target.classList.contains('marker')) return;
                const rect = container.getBoundingClientRect();
                const x = (e.clientX - rect.left) / currentScale;
                const y = (e.clientY - rect.top) / currentScale;
                
                const limit = document.getElementById('fixed-count').value || 99;
                if(markers.length < limit) {
                    markers.push({x, y, name: "", code: Math.random().toString(36).substr(2, 6).toUpperCase()});
                    renderMarkers();
                }
            };

            // Drag and Drop
            window.onmousemove = (e) => {
                if (draggedIdx === null) return;
                const rect = container.getBoundingClientRect();
                markers[draggedIdx].x = (e.clientX - rect.left) / currentScale;
                markers[draggedIdx].y = (e.clientY - rect.top) / currentScale;
                renderMarkers();
            };
            window.onmouseup = () => { draggedIdx = null; };

            // Zoom via Mouse Wheel / Touchpad
            container.onwheel = (e) => {
                e.preventDefault();
                const delta = e.deltaY > 0 ? 0.9 : 1.1;
                currentScale = Math.min(Math.max(0.5, currentScale * delta), 4);
                container.style.transform = `scale(${currentScale})`;
            };
        }

        function toggleAddMode() {
            isAddMode = !isAddMode;
            const btn = document.getElementById('btn-add-toggle');
            btn.style.background = isAddMode ? "#d32f2f" : "#2e7d32";
            btn.innerText = isAddMode ? "CANCELAR ADICIONAR" : "ADICIONAR OBJETIVOS";
            document.getElementById('map-container').classList.toggle('editing', isAddMode);
        }

        function renderMarkers() {
            const layer = document.getElementById('markers-layer');
            const svg = document.getElementById('map-svg');
            layer.innerHTML = ""; svg.innerHTML = "";
            let pathData = "";

            markers.forEach((m, i) => {
                const div = document.createElement('div');
                div.className = 'marker';
                div.style.left = m.x + "px"; div.style.top = m.y + "px";
                div.innerHTML = (i + 1) + (m.name ? `<div class="marker-label">${m.name}</div>` : "");

                div.onmousedown = (e) => { e.stopPropagation(); draggedIdx = i; };
                div.onclick = (e) => {
                    e.stopPropagation();
                    activeMarkerIdx = i;
                    const menu = document.getElementById('marker-options');
                    menu.style.display = 'block';
                    menu.style.left = e.clientX + 'px';
                    menu.style.top = e.clientY + 'px';
                };

                layer.appendChild(div);
                if (i === 0) pathData = `M ${m.x} ${m.y}`;
                else pathData += ` L ${m.x} ${m.y}`;
            });

            if(markers.length >= 2) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "path");
                line.setAttribute("d", pathData);
                line.setAttribute("stroke", "white");
                line.setAttribute("stroke-width", "3");
                line.setAttribute("fill", "none");
                line.setAttribute("stroke-dasharray", "8,5");
                svg.appendChild(line);
            }
        }

        // Funções do Menu de Marcador
        function optRename() {
            const n = prompt("Nome do objetivo:", markers[activeMarkerIdx].name);
            if(n !== null) markers[activeMarkerIdx].name = n;
            closeMarkerMenu();
        }
        function optChangeNum() {
            const n = parseInt(prompt("Novo número para este ponto:"));
            if(n > 0 && n <= markers.length) {
                const item = markers.splice(activeMarkerIdx, 1)[0];
                markers.splice(n-1, 0, item);
            }
            closeMarkerMenu();
        }
        function optQRCode() {
            alert("Código para QR: TQ-" + markers[activeMarkerIdx].code);
            closeMarkerMenu();
        }
        function optDelete() {
            if(confirm("Excluir este objetivo?")) markers.splice(activeMarkerIdx, 1);
            closeMarkerMenu();
        }
        function closeMarkerMenu() {
            document.getElementById('marker-options').style.display = 'none';
            renderMarkers();
        }

        function finishMap() { mapReady = true; checkGlobalReady(); showScreen('screen-main-menu'); }
        function checkGlobalReady() {
            const btn = document.getElementById('btn-final-codes');
            btn.disabled = !(mapReady && groupsReady);
            btn.className = btn.disabled ? 'b
