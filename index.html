<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Pro</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@700&family=Roboto:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        :root {
            --verde-comando: #2e7d32;
            --marrom-voltar: #3e2723;
            --bege-menu: rgba(255, 253, 231, 0.98);
            --amarelo-ativo: #ffeb3b;
            --branco: #ffffff;
            --vermelho-erro: #d32f2f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; font-family: 'Special Elite', serif; background: #1a1a1a; overflow: hidden; }

        #map { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }

        .controles-mapa { position: absolute; bottom: 100px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1002; }
        .btn-map-ctrl {
            width: 52px; height: 52px; background: white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; border: none; font-size: 1.4rem; color: #444;
        }

        .header-edicao {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%);
            background: var(--bege-menu); padding: 12px; border: 2px solid var(--marrom-voltar);
            z-index: 1005; border-radius: 8px; text-align: center; width: 90%; max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .modal-slots {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--bege-menu); border: 3px solid var(--marrom-voltar);
            padding: 20px; width: 85%; max-width: 320px; z-index: 1100; text-align: center;
        }

        .slot-card {
            background: white; border: 1px solid #ccc; margin: 8px 0; padding: 10px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            font-family: 'Montserrat', sans-serif; font-size: 0.8rem;
        }
        .slot-card.cheio { border-left: 5px solid var(--verde-comando); }

        .cenario { width: 100vw; height: 100vh; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .menu-bege { background: var(--bege-menu); border: 2px solid var(--marrom-voltar); padding: 25px; width: 88%; max-width: 380px; text-align: center; box-shadow: 10px 10px 0px var(--marrom-voltar); position: relative; z-index: 1000; }
        
        .titulo-app { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--verde-comando); margin-bottom: 10px; }
        h2 { font-family: 'Montserrat', sans-serif; font-size: 0.8rem; margin: 15px 0 5px 0; text-transform: uppercase; color: var(--marrom-voltar); }
        input { font-family: 'Roboto', sans-serif !important; width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; background: var(--branco) !important; color: #333; text-align: center; border-radius: 4px; }

        .btn { width: 100%; padding: 15px; margin-top: 10px; font-family: 'Montserrat', sans-serif; font-weight: bold; text-transform: uppercase; cursor: pointer; border: none; border-radius: 4px; }
        .btn-verde { background: var(--verde-comando); color: white; }
        .btn-marrom { background: var(--marrom-voltar); color: white; }
        .btn-neutro { background: var(--branco); color: #333; border: 1px solid #ccc; }
        .btn-ativo { background: var(--amarelo-ativo) !important; color: #000 !important; }

        .rodape-strava { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 2px solid var(--marrom-voltar); z-index: 1001; }
        .icon-nav { text-align: center; font-family: 'Montserrat', sans-serif; font-size: 0.65rem; font-weight: bold; color: #555; text-transform: uppercase; cursor: pointer; }
        .icon-nav span { font-size: 1.4rem; display: block; margin-bottom: 2px; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bege-menu); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; z-index: 1100; }
        .aviso-erro { color: var(--vermelho-erro); font-family: 'Roboto'; font-size: 0.7rem; font-weight: bold; margin-top: -5px; display: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="app"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const App = {
            el: document.getElementById('app'),
            map: null,
            layers: {},
            userMarker: null,
            modoEdicao: false,
            pontosTemporarios: [],
            linhaTemporaria: null,
            marcasNoMapa: [],
            db: {
                user: { nick: "", tipo: "" },
                grupos: { qtd: 0, pessoas: 0, lideres: 0, opcional: "", ok: false },
                percurso: { fixos: 0, moveis: 0, ok: false },
                mapasSalvos: [null, null, null, null, null]
            },

            render(html) { this.el.innerHTML = html; },

            abertura() {
                this.render(`<div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000')"><div class="menu-bege"><h1 class="titulo-app">TrailQuest</h1><button class="btn btn-verde" onclick="App.login()">Fazer Login</button><button class="btn btn-verde" onclick="App.participante()">Continuar como Participante</button></div></div>`);
            },

            login() {
                this.render(`<div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000')"><div class="menu-bege"><h2>Login</h2><input type="email" id="email" placeholder="EMAIL" oninput="App.validaLogin()"><input type="password" id="senha" placeholder="SENHA" oninput="App.validaLogin()"><button id="btn-l" class="btn btn-neutro" onclick="App.askNick('org')">Continuar</button><button class="btn btn-marrom" onclick="App.abertura()">Voltar</button><div id="nick-ov" class="overlay hidden"><h2>Nome de Usuário</h2><input type="text" id="nick-in" placeholder="Nickname"><button class="btn btn-verde" onclick="App.saveUser()">Salvar</button></div></div></div>`);
            },

            participante() {
                this.render(`<div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000')"><div class="menu-bege"><h2>Código de Acesso</h2><input type="text" id="cod" placeholder="Digite o Código" oninput="App.validaPart()"><button id="btn-p" class="btn btn-neutro" onclick="App.askNick('part')">Continuar</button><button class="btn btn-marrom" onclick="App.abertura()">Voltar</button><div id="nick-ov" class="overlay hidden"><h2>Nome de Usuário</h2><input type="text" id="nick-in" placeholder="Nickname"><button class="btn btn-verde" onclick="App.saveUser()">Salvar</button></div></div></div>`);
            },

            home() {
                this.render(`<div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000')"><div class="menu-bege"><h1 class="titulo-app" style="font-size:2rem">Olá, ${this.db.user.nick}</h1><button class="btn btn-verde" onclick="App.comando()">Organizador</button><button class="btn btn-verde" onclick="alert('Área do Participante em breve')">Participante</button></div></div>`);
            },

            comando() {
                this.render(`
                    <div id="map"></div>
                    ${this.modoEdicao ? `
                        <div class="header-edicao">
                            <h2 style="margin:0; font-size:0.8rem">Editando Pontos (${this.pontosTemporarios.length}/${this.db.percurso.fixos})</h2>
                            <div style="display:flex; gap:5px; margin-top:8px">
                                <button class="btn btn-marrom" style="padding:5px; margin:0; font-size:0.6rem" onclick="App.limparEdicao()">Limpar</button>
                                <button class="btn btn-verde" style="padding:5px; margin:0; font-size:0.6rem" onclick="App.abrirSlots()">Salvar Mapa</button>
                                <button class="btn btn-neutro" style="padding:5px; margin:0; font-size:0.6rem" onclick="App.cancelarEdicao()">Sair</button>
                            </div>
                        </div>
                    ` : ''}
                    <div id="modal-slots" class="modal-slots hidden">
                        <h2>Escolha um Slot (1-5)</h2>
                        <div id="lista-slots"></div>
                        <button class="btn btn-marrom" onclick="document.getElementById('modal-slots').classList.add('hidden')">Cancelar</button>
                    </div>
                    <div class="controles-mapa">
                        <button class="btn-map-ctrl" onclick="App.toggleSat()">🛰️</button>
                        <button class="btn-map-ctrl" onclick="App.focarGPS()">🎯</button>
                    </div>
                    <div class="rodape-strava">
                        <div class="icon-nav" onclick="App.home()"><span>🏠</span>Início</div>
                        <div class="icon-nav" onclick="App.mestre()"><span>🗺️</span>Mapas</div>
                        <div class="icon-nav" style="opacity:0.3"><span>⚪</span>Começar</div>
                        <div class="icon-nav" style="opacity:0.3"><span>🔺</span>Grupos</div>
                    </div>
                `);
                this.initMap();
            },

            initMap() {
                this.layers.ruas = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
                this.layers.satelite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
                
                // Reativado Zoom Control para permitir zoom livre
                this.map = L.map('map', { 
                    layers: [this.layers.ruas], 
                    zoomControl: true,
                    dragging: true,
                    touchZoom: true,
                    scrollWheelZoom: true
                }).setView([-23.55, -46.63], 13);
                
                this.map.locate({setView: true, maxZoom: 16, watch: true, enableHighAccuracy: true});
                this.map.on('locationfound', (e) => {
                    this.currentPos = e.latlng;
                    if (this.userMarker) this.userMarker.setLatLng(e.latlng);
                    else this.userMarker = L.circleMarker(e.latlng, {color: '#2196F3', fillOpacity: 0.8, radius: 9, weight: 3}).addTo(this.map);
                });

                // Lógica de adicionar pontos no clique corrigida
                this.map.on('click', (e) => {
                    if(this.modoEdicao) {
                        if(this.pontosTemporarios.length < this.db.percurso.fixos) {
                            this.adicionarPontoGrafico(e.latlng);
                        } else {
                            alert("Limite de pontos atingido!");
                        }
                    }
                });
            },

            adicionarPontoGrafico(latlng) {
                const num = this.pontosTemporarios.length + 1;
                const marker = L.marker(latlng, {
                    icon: L.divIcon({
                        className: 'ponto-track',
                        html: `<div style="background:var(--verde-comando); color:white; border-radius:50%; width:24px; height:24px; display:flex; align-items:center; justify-content:center; border:2px solid white; font-weight:bold; font-size:12px">${num}</div>`
                    })
                }).addTo(this.map);
                
                this.marcasNoMapa.push(marker);
                this.pontosTemporarios.push(latlng);
                
                if (this.linhaTemporaria) this.map.removeLayer(this.linhaTemporaria);
                this.linhaTemporaria = L.polyline(this.pontosTemporarios, {color: 'var(--marrom-voltar)', weight: 3, dashArray: '5, 10'}).addTo(this.map);
                
                // Atualiza o contador no cabeçalho
                document.querySelector('.header-edicao h2').innerText = `Editando Pontos (${this.pontosTemporarios.length}/${this.db.percurso.fixos})`;
            },

            abrirSlots() {
                const container = document.getElementById('lista-slots');
                container.innerHTML = "";
                this.db.mapasSalvos.forEach((mapa, index) => {
                    const div = document.createElement('div');
                    div.className = `slot-card ${mapa ? 'cheio' : ''}`;
                    div.innerHTML = `<span>Mapa Slot ${index + 1}</span> <span>${mapa ? 'Sustituir' : 'Vazio'}</span>`;
                    div.onclick = () => this.confirmarSalvamento(index);
                    container.appendChild(div);
                });
                document.getElementById('modal-slots').classList.remove('hidden');
            },

            confirmarSalvamento(index) {
                if(this.pontosTemporarios.length < this.db.percurso.fixos) {
                    alert("Marque todos os pontos antes de salvar!");
                    return;
                }
                this.db.mapasSalvos[index] = [...this.pontosTemporarios];
                alert(`Mapa salvo no Slot ${index + 1}!`);
                document.getElementById('modal-slots').classList.add('hidden');
                this.modoEdicao = false;
                this.mestre();
            },

            limparEdicao() {
                this.marcasNoMapa.forEach(m => this.map.removeLayer(m));
                if(this.linhaTemporaria) this.map.removeLayer(this.linhaTemporaria);
                this.pontosTemporarios = [];
                this.marcasNoMapa = [];
                document.querySelector('.header-edicao h2').innerText = `Editando Pontos (0/${this.db.percurso.fixos})`;
            },

            cancelarEdicao() { this.modoEdicao = false; this.mestre(); },
            toggleSat() { if (this.map.hasLayer(this.layers.ruas)) { this.map.removeLayer(this.layers.ruas); this.map.addLayer(this.layers.satelite); } else { this.map.removeLayer(this.layers.satelite); this.map.addLayer(this.layers.ruas); } },
            focargps() { if(this.currentPos) this.map.setView(this.currentPos, 17); },

            mestre() {
                const liberado = this.db.grupos.ok && this.db.percurso.ok;
                this.render(`
                    <div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000')">
                        <div class="menu-bege">
                            <h2>Página Mestre</h2>
                            <button class="btn btn-verde" onclick="App.telaGrupos()">Organizar Grupos</button>
                            <button class="btn btn-verde" onclick="App.telaPercursos()">Organizar Percursos</button>
                            <button class="btn ${liberado ? 'btn-ativo' : ''}" style="margin-top:20px" onclick="${liberado ? 'App.iniciarEdicao()' : ''}">Editar Pontos no Mapa</button>
                            <button class="btn btn-marrom" onclick="App.comando()">Voltar ao Mapa</button>
                        </div>
                    </div>
                `);
            },

            iniciarEdicao() { 
                if(this.db.percurso.fixos < 1) { alert("Configure o número de objetivos fixos primeiro!"); return; }
                this.modoEdicao = true; 
                this.pontosTemporarios = []; 
                this.comando(); 
            },

            telaGrupos() {
                this.render(`
                    <div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000')">
                        <div class="menu-bege">
                            <h2>Número de Grupos</h2>
                            <input type="number" id="ig1" value="${this.db.grupos.qtd || ''}" placeholder="Máx 30" oninput="App.checkRegrasG()">
                            <div id="sg2" class="${this.db.grupos.qtd ? '' : 'hidden'}">
                                <h2>Pessoas por Grupo</h2>
                                <input type="number" id="ig2" value="${this.db.grupos.pessoas || ''}" placeholder="Máx 30" oninput="App.checkRegrasG()">
                            </div>
                            <div id="sg4" class="${this.db.grupos.pessoas ? '' : 'hidden'}">
                                <h2>Campo Opcional</h2>
                                <input type="text" id="ig-op" value="${this.db.grupos.opcional || ''}" placeholder="Digite aqui...">
                                <h2>Líderes por Grupo</h2>
                                <input type="number" id="ig4" value="${this.db.grupos.lideres || ''}" placeholder="Máx 30" oninput="App.checkRegrasG()">
                                <div id="erro-lider" class="aviso-erro">O n° de líderes não pode ser maior que o de pessoas!</div>
                                <button id="btn-g-ok" class="btn btn-neutro" onclick="App.saveG()">Confirmar</button>
                            </div>
                            <button class="btn btn-marrom" style="margin-top:10px" onclick="App.mestre()">Voltar</button>
                        </div>
                    </div>
                `);
            },

            telaPercursos() {
                this.render(`<div class="cenario" style="background-image: url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000')"><div class="menu-bege"><h2>Objetivos Fixos</h2><input type="number" id="ip1" value="${this.db.percurso.fixos || ''}" oninput="App.checkRegrasP()"><div id="sp2" class="${this.db.percurso.fixos ? '' : 'hidden'}"><h2>Objetivos Móveis</h2><input type="number" id="ip2" value="${this.db.percurso.moveis || ''}" oninput="App.checkRegrasP()"><button id="btn-p-ok" class="btn btn-neutro" onclick="App.saveP()">Confirmar</button></div><button class="btn btn-marrom" style="margin-top:10px" onclick="App.mestre()">Voltar</button></div></div>`);
            },

            validaLogin() { const b = document.getElementById('btn-l'); if(document.getElementById('email').value && document.getElementById('senha').value) b.classList.add('btn-ativo'); else b.classList.remove('btn-ativo'); },
            validaPart() { const b = document.getElementById('btn-p'); if(document.getElementById('cod').value) b.classList.add('btn-ativo'); else b.classList.remove('btn-ativo'); },
            askNick(tipo) { this.db.user.tipo = tipo; document.getElementById('nick-ov').classList.remove('hidden'); },
            saveUser() { this.db.user.nick = document.getElementById('nick-in').value; this.home(); },
            
            checkRegrasG() {
                let g1 = document.getElementById('ig1').value;
                let g2 = document.getElementById('ig2').value;
                let g4 = document.getElementById('ig4').value;
                if (!g1) { 
                    this.db.grupos = { qtd: 0, pessoas: 0, lideres: 0, opcional: "", ok: false }; 
                    document.getElementById('sg2').classList.add('hidden'); 
                    document.getElementById('sg4').classList.add('hidden'); 
                    return; 
                }
                if (parseInt(g1) > 30) { g1 = 30; document.getElementById('ig1').value = 30; }
                if (parseInt(g2) > 30) { g2 = 30; document.getElementById('ig2').value = 30; }
                if (parseInt(g4) > 30) { g4 = 30; document.getElementById('ig4').value = 30; }

                if(parseInt(g1) >= 1) document.getElementById('sg2').classList.remove('hidden');
                if(parseInt(g2) >= 1) document.getElementById('sg4').classList.remove('hidden');

                const erro = document.getElementById('erro-lider'); 
                const btn = document.getElementById('btn-g-ok');
                if(parseInt(g4) > parseInt(g2)) { erro.style.display = "block"; btn.classList.add('hidden'); }
                else { erro.style.display = "none"; if(g1 > 0 && g2 > 0) { btn.classList.remove('hidden'); btn.classList.add('btn-ativo'); } }
            },
            saveG() { 
                this.db.grupos.qtd = document.getElementById('ig1').value; 
                this.db.grupos.pessoas = document.getElementById('ig2').value; 
                this.db.grupos.opcional = document.getElementById('ig-op').value;
                this.db.grupos.lideres = document.getElementById('ig4').value; 
                this.db.grupos.ok = true; 
                this.mestre(); 
            },
            checkRegrasP() { const p1 = parseInt(document.getElementById('ip1').value); if(p1 >= 1) { document.getElementById('sp2').classList.remove('hidden'); document.getElementById('btn-p-ok').classList.add('btn-ativo'); } },
            saveP() { this.db.percurso.fixos = document.getElementById('ip1').value; this.db.percurso.moveis = document.getElementById('ip2').value; this.db.percurso.ok = true; this.mestre(); },
            focarGPS() { if(this.currentPos) this.map.setView(this.currentPos, 17); }
        };

        window.onload = () => App.abertura();
    </script>
</body>
</html>
