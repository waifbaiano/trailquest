<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>TrailQuest v9.0 | Enterprise Edition</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Roboto+Mono:wght@300;500;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        :root {
            --tq-primary: #1b5e20;
            --tq-accent: #ffab00;
            --tq-danger: #b71c1c;
            --tq-bg: #fdfdf5;
            --tq-dark: #1a1a1a;
            --tq-border: #2e1a16;
            --shadow-pro: 10px 10px 0px #2e1a16;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; background: #000; font-family: 'Roboto Mono', monospace; overflow: hidden; }

        /* Map Engine */
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; filter: saturate(1.1) contrast(1.1); }

        /* UI Shell */
        .ui-mount { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1000; pointer-events: none; }
        .ui-mount * { pointer-events: auto; }

        /* Tactical Components */
        .window-pro {
            background: var(--tq-bg); border: 3px solid var(--tq-border);
            padding: 30px; width: 92%; max-width: 460px; margin: auto;
            box-shadow: var(--shadow-pro); position: relative;
            max-height: 85vh; overflow-y: auto;
        }

        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 2000;
        }

        h1 { font-family: 'Special Elite', serif; color: var(--tq-primary); font-size: 2.5rem; text-align: center; margin-bottom: 20px; }
        h2 { font-family: 'Montserrat'; font-weight: 900; font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--tq-primary); margin: 20px 0 10px; padding-bottom: 5px; }

        .input-pro { width: 100%; padding: 15px; margin-bottom: 12px; border: 2px solid #ccc; background: #fff; font-family: inherit; font-size: 1rem; }
        
        .btn-pro {
            width: 100%; padding: 18px; border: none; font-family: 'Montserrat';
            font-weight: 900; text-transform: uppercase; cursor: pointer;
            transition: 0.2s; display: flex; align-items: center; justify-content: center; gap: 10px;
        }
        .btn-green { background: var(--tq-primary); color: white; }
        .btn-gold { background: var(--tq-accent); color: #000; }
        .btn-cancel { background: transparent; border: 2px solid var(--tq-border); color: var(--tq-border); margin-top: 10px; }

        /* Navigation Bar Professional */
        .nav-pro {
            position: fixed; bottom: 0; width: 100%; height: 80px;
            background: #fff; border-top: 3px solid var(--tq-border);
            display: flex; justify-content: space-around; padding-top: 10px; z-index: 1500;
        }
        .nav-item { flex: 1; text-align: center; color: #888; font-size: 0.65rem; font-weight: 700; font-family: 'Montserrat'; text-transform: uppercase; }
        .nav-item span { display: block; font-size: 1.6rem; margin-bottom: 2px; }
        .nav-item.active { color: var(--tq-primary); }

        /* HUD Tracker */
        .hud-chrono {
            position: absolute; top: 20px; right: 20px;
            background: white; border: 2px solid var(--tq-border);
            padding: 10px 15px; font-weight: 900; font-size: 1.2rem;
            box-shadow: 5px 5px 0px var(--tq-border);
        }

        /* Group Markers */
        .marker-group {
            width: 35px; height: 35px; border-radius: 50%;
            border: 3px solid white; display: flex; align-items: center;
            justify-content: center; color: white; font-weight: 900;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>
    <div id="ui-root" class="ui-mount"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        /**
         * TRAILQUEST CORE ENGINE v9.0
         * Modules: Auth, MapEngine, Sync, UI, Activity
         */

        const TQ = {
            state: {
                user: JSON.parse(localStorage.getItem('TQ_USER')) || null,
                activity: {
                    status: 'idle', // idle, running, paused
                    time: 0,
                    groups: [],
                    maps: JSON.parse(localStorage.getItem('TQ_MAPS')) || []
                },
                currentView: 'splash',
                activeMapIndex: 0,
                connectedUsers: [],
                gpsThrottle: 2000 // 2 seconds
            },

            // --- MODULE: INITIALIZATION ---
            init() {
                this.mapEngine.init();
                this.auth.autoLogin();
                this.render();
                this.gps.startTracking();
            },

            // --- MODULE: AUTHENTICATION ---
            auth: {
                login(email, password, nick) {
                    const newUser = { email, nick, id: 'u_' + Date.now(), xp: 0 };
                    TQ.state.user = newUser;
                    localStorage.setItem('TQ_USER', JSON.stringify(newUser));
                    TQ.state.currentView = 'dashboard';
                    TQ.render();
                },
                autoLogin() {
                    if(TQ.state.user) TQ.state.currentView = 'dashboard';
                }
            },

            // --- MODULE: MAP ENGINE (LEAFLET) ---
            mapEngine: {
                instance: null,
                layers: {},
                init() {
                    this.instance = L.map('map', { zoomControl: false, attributionControl: false }).setView([-23.55, -46.63], 15);
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(this.instance);
                },
                updateMarkers() {
                    // Logic for 100 users rendering optimization
                    this.instance.eachLayer((layer) => {
                        if (!!layer.toGeoJSON && layer !== this.instance) this.instance.removeLayer(layer);
                    });
                    
                    // Render Objectives
                    const currentMap = TQ.state.activity.maps[TQ.state.activeMapIndex];
                    if(currentMap) {
                        currentMap.points.forEach(p => {
                            L.marker(p.latlng, {
                                icon: L.divIcon({
                                    className: '',
                                    html: `<div class="marker-group" style="background:${currentMap.color}">${p.num}</div>`
                                })
                            }).addTo(this.instance).on('click', () => TQ.ui.openObjectiveMenu(p));
                        });
                    }
                }
            },

            // --- MODULE: GPS TRACKING ---
            gps: {
                startTracking() {
                    setInterval(() => {
                        navigator.geolocation.getCurrentPosition((pos) => {
                            const coords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                            // Simulate sending to Supabase
                            console.log('Syncing location...', coords);
                        });
                    }, TQ.state.gpsThrottle);
                }
            },

            // --- MODULE: OBJECTIVES & REORDERING ---
            objectives: {
                reorder(mapIndex, pointId, newNum) {
                    const map = TQ.state.activity.maps[mapIndex];
                    const point = map.points.find(p => p.id === pointId);
                    const target = map.points.find(p => p.num === parseInt(newNum));
                    
                    if(target) target.num = point.num;
                    point.num = parseInt(newNum);
                    
                    map.points.sort((a, b) => a.num - b.num);
                    TQ.save();
                    TQ.mapEngine.updateMarkers();
                }
            },

            // --- MODULE: UI CONTROLLER ---
            render() {
                const root = document.getElementById('ui-root');
                root.innerHTML = '';

                if(this.state.currentView === 'splash') {
                    root.innerHTML = this.ui.splash();
                } else if(this.state.currentView === 'login') {
                    root.innerHTML = this.ui.login();
                } else if(this.state.currentView === 'dashboard') {
                    root.innerHTML = this.ui.dashboard();
                    this.mapEngine.updateMarkers();
                }
            },

            ui: {
                splash: () => `
                    <div class="overlay">
                        <div class="window-pro">
                            <h1>TrailQuest</h1>
                            <button class="btn-pro btn-green" onclick="TQ.state.currentView='login'; TQ.render()">Entrar no Sistema</button>
                            <button class="btn-pro btn-gold" style="margin-top:15px" onclick="TQ.state.currentView='dashboard'; TQ.render()">Modo Participante</button>
                        </div>
                    </div>
                `,
                login: () => `
                    <div class="overlay">
                        <div class="window-pro">
                            <h2>Autenticação</h2>
                            <input type="text" id="l-nick" class="input-pro" placeholder="Nickname">
                            <input type="email" id="l-email" class="input-pro" placeholder="Email">
                            <input type="password" id="l-pass" class="input-pro" placeholder="Senha">
                            <button class="btn-pro btn-green" onclick="TQ.auth.login(
                                document.getElementById('l-email').value,
                                document.getElementById('l-pass').value,
                                document.getElementById('l-nick').value
                            )">Registrar e Entrar</button>
                        </div>
                    </div>
                `,
                dashboard: () => `
                    <div class="hud-chrono" id="chrono">00:00:00</div>
                    <nav class="nav-pro">
                        <div class="nav-item active"><span>🏠</span>Início</div>
                        <div class="nav-item" onclick="TQ.ui.openMapsMenu()"><span>🗺️</span>Mapas</div>
                        <div class="nav-item" onclick="TQ.ui.openConfig()"><span>⚙️</span>Ajustes</div>
                        <div class="nav-item" onclick="TQ.ui.openProfile()"><span>👤</span>Perfil</div>
                    </nav>
                `,

                openMapsMenu() {
                    const div = document.createElement('div');
                    div.className = 'overlay';
                    div.innerHTML = `
                        <div class="window-pro">
                            <h2>Gerenciador de Mapas</h2>
                            <div id="map-list">
                                ${TQ.state.activity.maps.map((m, i) => `
                                    <div style="padding:15px; background:white; border-left:10px solid ${m.color}; margin-bottom:10px" onclick="TQ.state.activeMapIndex=${i}; TQ.mapEngine.updateMarkers(); this.closest('.overlay').remove()">
                                        <b>${m.name}</b><br><small>${m.points.length} Objetivos</small>
                                    </div>
                                `).join('')}
                            </div>
                            <button class="btn-pro btn-green" onclick="TQ.ui.createNewMap()">Criar Novo Mapa</button>
                            <button class="btn-pro btn-cancel" onclick="this.closest('.overlay').remove()">Fechar</button>
                        </div>
                    `;
                    document.body.appendChild(div);
                },

                createNewMap() {
                    const colors = ['verde', 'vermelho', 'azul', 'amarelo', 'preto'];
                    const colorHex = { verde:'#1b5e20', vermelho:'#b71c1c', azul:'#0d47a1', amarelo:'#fbc02d', preto:'#000' };
                    const name = prompt("Nome do Mapa:");
                    const color = prompt("Cor (verde, vermelho, azul, amarelo, preto):");
                    
                    if(name && color) {
                        TQ.state.activity.maps.push({
                            id: Date.now(),
                            name: name,
                            color: colorHex[color] || '#000',
                            points: []
                        });
                        TQ.save();
                        this.openMapsMenu();
                    }
                },

                openObjectiveMenu(p) {
                    const div = document.createElement('div');
                    div.className = 'overlay';
                    div.innerHTML = `
                        <div class="window-pro">
                            <h2>Objetivo ${p.num}</h2>
                            <input type="text" id="edit-n" class="input-pro" value="${p.name}">
                            <input type="number" id="edit-num" class="input-pro" value="${p.num}">
                            <p style="margin-bottom:10px">Código de Validação: <b>${p.code}</b></p>
                            <button class="btn-pro btn-green" onclick="TQ.objectives.reorder(TQ.state.activeMapIndex, ${p.id}, document.getElementById('edit-num').value); this.closest('.overlay').remove()">Salvar Alterações</button>
                            <button class="btn-pro btn-cancel" onclick="this.closest('.overlay').remove()">Voltar</button>
                        </div>
                    `;
                    document.body.appendChild(div);
                }
            },

            save() {
                localStorage.setItem('TQ_MAPS', JSON.stringify(TQ.state.activity.maps));
            }
        };

        // Event Listeners for Professional Interaction
        window.addEventListener('load', () => TQ.init());

        // Map Click to Add Objective (Admin Only Logic)
        TQ.mapEngine.instance?.on('click', (e) => {
            if(TQ.state.user) {
                const map = TQ.state.activity.maps[TQ.state.activeMapIndex];
                if(!map) return alert("Crie um mapa primeiro!");
                const num = map.points.length + 1;
                map.points.push({
                    id: Date.now(),
                    num: num,
                    name: 'Objetivo ' + num,
                    code: Math.floor(100000 + Math.random() * 900000),
                    latlng: e.latlng
                });
                TQ.save();
                TQ.mapEngine.updateMarkers();
            }
        });
    </script>
</body>
</html>
