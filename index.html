<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Ultra PRO | Enterprise Edition</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Roboto+Mono:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #1b5e20;
            --primary-light: #4c8c4a;
            --accent: #ffd600;
            --danger: #d32f2f;
            --bg-paper: #f5f5f0;
            --text-dark: #212121;
            --shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            font-family: 'Roboto Mono', monospace; 
            background: #000; color: var(--text-dark);
            overflow: hidden;
        }

        /* Mapa e UI Base */
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }

        .app-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1000; pointer-events: none;
            display: flex; flex-direction: column;
        }
        .app-layer * { pointer-events: auto; }

        /* Telas Fullscreen */
        .screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(8px);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; transition: opacity 0.3s;
        }

        .container-bege {
            background: var(--bg-paper);
            width: 90%; max-width: 450px;
            padding: 30px; border-radius: 4px;
            border: 3px solid var(--primary);
            box-shadow: 12px 12px 0px var(--primary);
            max-height: 90vh; overflow-y: auto;
        }

        /* Tipografia */
        h1 { font-family: 'Special Elite', serif; color: var(--primary); font-size: 2.5rem; text-align: center; }
        h2 { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 0.9rem; text-transform: uppercase; margin: 15px 0 8px; color: #444; border-left: 4px solid var(--primary); padding-left: 10px; }

        /* Inputs e Botões Estilizados */
        .input-group { margin-bottom: 15px; }
        input {
            width: 100%; padding: 15px; border: 2px solid #ddd;
            background: white; font-family: inherit; font-size: 1rem;
            border-radius: 4px; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 10px rgba(27,94,32,0.2); }

        .btn {
            width: 100%; padding: 18px; border: none; border-radius: 4px;
            font-family: 'Montserrat', sans-serif; font-weight: 700;
            text-transform: uppercase; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: translateY(2px); filter: brightness(1.2); }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); }
        .btn-disabled { background: #ccc !important; color: #888 !important; cursor: not-allowed; }

        /* Componentes de Status e Cards */
        .card-user {
            background: white; padding: 15px; margin-bottom: 10px;
            border-radius: 4px; border-left: 6px solid var(--primary);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .status-badge { font-size: 0.7rem; padding: 4px 8px; border-radius: 10px; background: #e0e0e0; }

        /* Rodapé de Navegação Alta Performance */
        .navbar {
            position: fixed; bottom: 0; width: 100%;
            background: white; display: flex; justify-content: space-around;
            padding: 10px 0 25px; border-top: 2px solid var(--primary);
            z-index: 1500;
        }
        .nav-item {
            flex: 1; text-align: center; font-size: 0.65rem;
            font-weight: 700; color: #666; font-family: 'Montserrat';
        }
        .nav-item span { font-size: 1.5rem; display: block; margin-bottom: 2px; }
        .nav-item.active { color: var(--primary); }

        /* Elementos de Mapa */
        .custom-pin {
            background: var(--primary); color: white;
            border: 2px solid white; border-radius: 50%;
            width: 30px; height: 30px; display: flex;
            align-items: center; justify-content: center;
            font-weight: bold; box-shadow: var(--shadow);
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="ui-engine" class="app-layer">
        </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        /**
         * TRAILQUEST CORE ENGINE v5.0
         * Sistema otimizado para alta escala e resiliência de conexão.
         */
        const TQ = {
            state: {
                user: JSON.parse(localStorage.getItem('tq_user')) || { nick: '', role: '', session: null },
                config: JSON.parse(localStorage.getItem('tq_config')) || { groups: null, percurso: null },
                slots: JSON.parse(localStorage.getItem('tq_slots')) || [null, null, null, null, null],
                activeSlot: 0,
                points: [],
                onlineUsers: 100, // Simulação de carga
                isOnline: navigator.onLine
            },

            map: null,
            markers: [],
            userMarker: null,

            init() {
                this.renderSplash();
                window.addEventListener('online', () => this.updateConnection(true));
                window.addEventListener('offline', () => this.updateConnection(false));
            },

            updateConnection(status) {
                this.state.isOnline = status;
                console.log(status ? "Sinal Restaurado" : "Modo Offline Ativado");
            },

            save() {
                localStorage.setItem('tq_user', JSON.stringify(this.state.user));
                localStorage.setItem('tq_config', JSON.stringify(this.state.config));
                localStorage.setItem('tq_slots', JSON.stringify(this.state.slots));
            },

            // --- ROTEAMENTO ---
            renderSplash() {
                document.getElementById('ui-engine').innerHTML = `
                    <div class="screen" style="background: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000') center/cover">
                        <div class="container-bege">
                            <h1>TrailQuest</h1>
                            <p style="text-align:center; font-size:0.7rem; letter-spacing:2px; margin-bottom:30px">SISTEMA DE ALTA PERFORMANCE</p>
                            <button class="btn btn-primary" onclick="TQ.go('login')">Painel Administrativo</button>
                            <button class="btn btn-primary" onclick="TQ.go('guest')">Entrar como Participante</button>
                        </div>
                    </div>`;
            },

            go(page) {
                const ui = document.getElementById('ui-engine');
                switch(page) {
                    case 'login': this.viewLogin(); break;
                    case 'guest': this.viewGuest(); break;
                    case 'nick': this.viewNick(); break;
                    case 'main': this.viewMain(); break;
                    case 'config': this.viewConfig(); break;
                    case 'monitor': this.viewMonitor(); break;
                }
            },

            // --- VIEWS ---
            viewLogin() {
                document.getElementById('ui-engine').innerHTML = `
                <div class="screen">
                    <div class="container-bege">
                        <h2>Autenticação</h2>
                        <input type="email" placeholder="E-mail Administrativo" class="input-group">
                        <input type="password" id="pass" placeholder="Senha de Acesso" class="input-group" oninput="TQ.checkPass(this.value)">
                        <button id="btn-auth" class="btn btn-disabled" disabled onclick="TQ.go('nick')">Acessar Sistema</button>
                        <button class="btn btn-outline" onclick="TQ.renderSplash()">Voltar</button>
                    </div>
                </div>`;
            },

            checkPass(v) {
                const btn = document.getElementById('btn-auth');
                if(v.length >= 8) { btn.disabled = false; btn.className = 'btn btn-primary'; }
                else { btn.disabled = true; btn.className = 'btn btn-disabled'; }
            },

            viewNick() {
                document.getElementById('ui-engine').innerHTML = `
                <div class="screen">
                    <div class="container-bege">
                        <h2>Identificação</h2>
                        <p style="font-size:0.7rem; margin-bottom:15px">Defina seu codinome para transmissão em tempo real.</p>
                        <input type="text" id="nick-in" placeholder="Ex: Alfa_Líder" class="input-group">
                        <button class="btn btn-primary" onclick="TQ.setNick()">Confirmar e Iniciar</button>
                    </div>
                </div>`;
            },

            setNick() {
                this.state.user.nick = document.getElementById('nick-in').value || 'User_' + Math.floor(Math.random()*999);
                this.save();
                this.go('main');
            },

            viewMain() {
                const ui = document.getElementById('ui-engine');
                ui.innerHTML = `
                    <div id="ui-controls" class="app-layer">
                        <div id="top-panel"></div>
                    </div>
                    <nav class="navbar">
                        <div class="nav-item active" onclick="TQ.go('main')"><span>🏠</span>Dashboard</div>
                        <div class="nav-item" onclick="TQ.go('config')"><span>⚙️</span>Ajustes</div>
                        <div class="nav-item" onclick="TQ.go('monitor')"><span>📡</span>Radar</div>
                        <div class="nav-item" onclick="TQ.viewProfile()"><span>👤</span>Perfil</div>
                    </nav>
                `;
                this.initMap();
                this.refreshUI();
            },

            viewConfig() {
                document.getElementById('ui-engine').innerHTML = `
                <div class="screen">
                    <div class="container-bege">
                        <h1>Configurações</h1>
                        
                        <h2>1. Estrutura de Grupos</h2>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                            <input type="number" id="c-g-qtd" placeholder="Qtd Grupos" value="${this.state.config.groups?.qtd || ''}">
                            <input type="number" id="c-g-ppx" placeholder="Pessoas/Gr" value="${this.state.config.groups?.ppx || ''}">
                        </div>

                        <h2>2. Percurso</h2>
                        <input type="number" id="c-p-fix" placeholder="Objetivos Fixos" class="input-group" value="${this.state.config.percurso?.fix || ''}">
                        <input type="number" id="c-p-mov" placeholder="Objetivos Móveis (Opcional)" class="input-group" value="${this.state.config.percurso?.mov || ''}">

                        <button class="btn btn-primary" onclick="TQ.saveConfig()">Salvar e Ir para Mapa</button>
                        <button class="btn btn-outline" onclick="TQ.go('main')">Voltar</button>
                    </div>
                </div>`;
            },

            saveConfig() {
                this.state.config.groups = {
                    qtd: document.getElementById('c-g-qtd').value,
                    ppx: document.getElementById('c-g-ppx').value
                };
                this.state.config.percurso = {
                    fix: document.getElementById('c-p-fix').value,
                    mov: document.getElementById('c-p-mov').value
                };
                this.save();
                this.go('main');
                this.enterEditMode();
            },

            // --- ENGINE DO MAPA ---
            initMap() {
                if(this.map) return;
                
                this.map = L.map('map', { zoomControl: false, preferCanvas: true }).setView([-23.55, -46.63], 13);
                
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© TrailQuest High Performance'
                }).addTo(this.map);

                this.map.locate({setView: true, maxZoom: 16, watch: true, enableHighAccuracy: true});
                
                this.map.on('locationfound', (e) => {
                    if(!this.userMarker) {
                        this.userMarker = L.circleMarker(e.latlng, {radius: 10, color: '#2196F3', fillOpacity: 0.8}).addTo(this.map);
                    } else {
                        this.userMarker.setLatLng(e.latlng);
                    }
                });

                this.map.on('click', (e) => {
                    if(this.state.editMode) {
                        this.addPoint(e.latlng);
                    }
                });
            },

            enterEditMode() {
                this.state.editMode = true;
                const top = document.getElementById('top-panel');
                top.innerHTML = `
                    <div style="background:var(--bg-paper); padding:15px; border-bottom:4px solid var(--primary); pointer-events:auto; box-shadow:var(--shadow)">
                        <h2 style="margin:0">Modo Edição Ativo</h2>
                        <p style="font-size:0.6rem">Toque no mapa para inserir os pontos fixos (${this.state.points.length}/${this.state.config.percurso?.fix})</p>
                        <div style="display:flex; gap:10px; margin-top:10px">
                            <button class="btn btn-primary" style="padding:10px; font-size:0.7rem" onclick="TQ.exitEdit()">Finalizar Mapa</button>
                            <button class="btn btn-outline" style="padding:10px; font-size:0.7rem" onclick="TQ.clearPoints()">Limpar</button>
                        </div>
                    </div>`;
            },

            exitEdit() {
                this.state.editMode = false;
                document.getElementById('top-panel').innerHTML = '';
                this.state.slots[this.state.activeSlot] = { points: this.state.points };
                this.save();
                alert("Mapa salvo com sucesso no Slot " + (this.state.activeSlot + 1));
            },

            addPoint(latlng) {
                if(this.state.points.length >= this.state.config.percurso?.fix) return;
                
                const marker = L.marker(latlng, {
                    icon: L.divIcon({
                        className: '',
                        html: `<div class="custom-pin"><span>${this.state.points.length + 1}</span></div>`,
                        iconSize: [30,30]
                    })
                }).addTo(this.map);
                
                this.state.points.push({ latlng, marker });
                this.enterEditMode(); // Refresh counter
            },

            clearPoints() {
                this.state.points.forEach(p => this.map.removeLayer(p.marker));
                this.state.points = [];
                this.enterEditMode();
            },

            // --- RADAR DE USUÁRIOS (REAL-TIME) ---
            viewMonitor() {
                document.getElementById('ui-engine').innerHTML = `
                <div class="screen">
                    <div class="container-bege">
                        <h1>Radar de Equipes</h1>
                        <p style="font-size:0.6rem; text-align:center; margin-bottom:20px">Transmitindo localização de 100 usuários</p>
                        
                        <div id="user-list" style="max-height:300px; overflow-y:auto">
                            </div>

                        <button class="btn btn-primary" onclick="TQ.go('main')">Fechar Radar</button>
                    </div>
                </div>`;
                
                const list = document.getElementById('user-list');
                for(let i=1; i<=10; i++) {
                    list.innerHTML += `
                        <div class="card-user">
                            <div>
                                <b style="font-size:0.8rem">Equipe_Alpha_${i}</b><br>
                                <small style="font-size:0.6rem">Lat: -23.5 | Lng: -46.6</small>
                            </div>
                            <span class="status-badge" style="background:#c8e6c9; color:#2e7d32">ATIVO</span>
                        </div>`;
                }
            },

            viewProfile() {
                document.getElementById('ui-engine').innerHTML = `
                <div class="screen">
                    <div class="container-bege">
                        <div style="text-align:center; margin-bottom:20px">
                            <div style="width:80px; height:80px; background:var(--primary); border-radius:50%; margin: 0 auto 10px; display:flex; align-items:center; justify-content:center; color:white; font-size:2rem">
                                ${this.state.user.nick.charAt(0)}
                            </div>
                            <h1 style="font-size:1.5rem">${this.state.user.nick}</h1>
                            <span class="status-badge">Nível: Organizador</span>
                        </div>

                        <h2>Estatísticas de Missão</h2>
                        <div style="display:flex; gap:10px; margin-bottom:20px">
                            <div style="flex:1; background:white; padding:10px; border-radius:4px; text-align:center">
                                <small>Kms</small><br><b>12.4</b>
                            </div>
                            <div style="flex:1; background:white; padding:10px; border-radius:4px; text-align:center">
                                <small>Tempo</small><br><b>02:45</b>
                            </div>
                            <div style="flex:1; background:white; padding:10px; border-radius:4px; text-align:center">
                                <small>Objetivos</small><br><b>08/10</b>
                            </div>
                        </div>

                        <button class="btn btn-primary" onclick="TQ.go('main')">Voltar</button>
                        <button class="btn btn-outline" style="color:var(--danger); border-color:var(--danger); margin-top:20px" onclick="localStorage.clear(); location.reload()">Resetar Sistema</button>
                    </div>
                </div>`;
            }
        };

        window.onload = () => TQ.init();
    </script>
</body>
</html>
