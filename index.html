<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Satisfy&family=Special+Elite&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen-start" class="screen start-bg">
        <div class="vintage-box">
            <h1 class="logo-font">TrailQuest</h1>
            <p class="handwritten">Inicie sua jornada</p>
            <button class="btn-vintage" onclick="showScreen('screen-login')">Fazer Login</button>
            <button class="btn-vintage-alt" onclick="showScreen('screen-pin')">Participante</button>
        </div>
    </div>

    <div id="screen-login" class="screen start-bg">
        <div class="vintage-box">
            <h2 class="handwritten">Mestre da Trilha</h2>
            <input type="email" placeholder="E-mail">
            <input type="password" placeholder="Senha">
            <button class="btn-vintage" onclick="showScreen('screen-main-menu')">Entrar</button>
            <button class="back-link" onclick="showScreen('screen-start')">Voltar</button>
        </div>
    </div>

    <div id="screen-pin" class="screen start-bg">
        <div class="vintage-box">
            <h2 class="handwritten">Código (6 dígitos)</h2>
            <input type="number" id="input-pin" placeholder="000000" oninput="checkPIN(this.value)">
            <button class="back-link" onclick="showScreen('screen-start')">Voltar</button>
        </div>
    </div>

    <div id="screen-main-menu" class="screen bg-paper">
        <div class="vintage-box">
            <h2 class="logo-font">Menu Mestre</h2>
            <button class="btn-vintage" onclick="showScreen('screen-objectives')">Escolher Objetivos</button>
            <button class="btn-vintage">Organizar Grupos</button>
            <button class="back-link" onclick="showScreen('screen-start')">Sair</button>
        </div>
    </div>

    <div id="screen-objectives" class="screen bg-paper">
        <div class="vintage-box">
            <h3 class="handwritten">Configurar Missão</h3>
            <label style="font-size: 0.8rem; display: block; margin-bottom: 5px;">Qtd. Objetivos Fixos:</label>
            <input type="number" id="fixed-count" placeholder="Ex: 10" oninput="checkObjectives()">
            
            <button id="btn-map" class="btn-inactive" disabled>Configurar Mapa</button>
            <button class="back-link" onclick="showScreen('screen-main-menu')">Voltar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
