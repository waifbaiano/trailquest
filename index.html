<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@700&family=Roboto:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        /* [SISTEMA DE CORES VINTAGE] */
        :root {
            --verde-comando: #2e7d32;
            --marrom-voltar: #3e2723;
            --bege-menu: rgba(255, 253, 231, 0.98);
            --amarelo-ativo: #ffeb3b;
            --branco-transparente: rgba(255, 255, 255, 0.8);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body, html { 
            height: 100%; width: 100%; 
            font-family: 'Special Elite', serif; 
            background: #1a1a1a; 
            overflow: hidden; 
        }

        /* Imagem de Floresta 1 ao fundo */
        .fundo-floresta {
            width: 100vw; height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
        }

        /* Menu Quadrado Central Bege */
        .menu-bege {
            background: var(--bege-menu);
            border: 2px solid var(--marrom-voltar);
            padding: 25px;
            width: 85%;
            max-width: 380px;
            text-align: center;
            box-shadow: 8px 8px 0px var(--marrom-voltar);
            position: relative;
        }

        /* Títulos e Textos */
        h2 { font-family: 'Montserrat', sans-serif; font-size: 1rem; margin-bottom: 15px; text-transform: uppercase; }
        .titulo-app { font-family: 'Dancing Script', cursive; font-size: 3rem; color: var(--verde-comando); margin-bottom: 10px; }

        /* Campos em Branco (Fonte Roboto) */
        input {
            font-family: 'Roboto', sans-serif !important;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            background: #fff !important;
            color: #333;
            text-align: center;
            border-radius: 4px;
        }

        /* Botões Estilizados */
        .btn {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            border-radius: 4px;
        }

        .btn-verde { background: var(--verde-comando); color: white; }
        .btn-marrom { background: var(--marrom-voltar); color: white; }
        .btn-continuar { background: #fff; color: #333; border: 1px solid #ccc; }
        
        /* Regra: Fica amarelo ao preencher */
        .btn-ativo { background: var(--amarelo-ativo) !important; color: #000 !important; }

        /* Menu Sobreposto (Nickname) */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bege-menu);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px; z-index: 10;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="app">
        </div>

    <script>
        const App = {
            elemento: document.getElementById('app'),
            dados: { email: "", senha: "", nick: "", codigo: "" },

            // Sistema de Navegação entre páginas
            irPara(pagina) {
                this[pagina]();
            },

            // [PÁGINA DE ABERTURA]
            abertura() {
                this.elemento.innerHTML = `
                    <div class="fundo-floresta">
                        <div class="menu-bege">
                            <h1 class="titulo-app">TrailQuest</h1>
                            <button class="btn btn-verde" onclick="App.irPara('login')">Fazer Login</button>
                            <button class="btn btn-verde" onclick="App.irPara('participante')">Continuar como Participante</button>
                        </div>
                    </div>
                `;
            },

            // [PÁGINA DE LOGIN]
            login() {
                this.elemento.innerHTML = `
                    <div class="fundo-floresta">
                        <div class="menu-bege" id="menu-login">
                            <h2>Login</h2>
                            <p style="font-size: 10px;">EMAIL</p>
                            <input type="email" id="email" oninput="App.validarLogin()">
                            <p style="font-size: 10px;">SENHA</p>
                            <input type="password" id="senha" oninput="App.validarLogin()">
                            
                            <button id="btn-login" class="btn btn-continuar" onclick="App.salvarNickname()">Continuar</button>
                            <button class="btn btn-marrom" onclick="App.irPara('abertura')">Voltar</button>

                            <div id="overlay-nick" class="overlay hidden">
                                <h2>Nome de Usuário</h2>
                                <input type="text" id="nick" placeholder="Seu Nickname">
                                <button class="btn btn-verde" onclick="App.finalizarLogin()">Salvar</button>
                            </div>
                        </div>
                    </div>
                `;
            },

            // [PÁGINA DE PARTICIPANTE]
            participante() {
                this.elemento.innerHTML = `
                    <div class="fundo-floresta">
                        <div class="menu-bege">
                            <h2 style="background: rgba(255,255,255,0.5); padding: 5px;">Código de Acesso</h2>
                            <input type="text" id="cod" placeholder="Digite o código" oninput="App.validarParticipante()">
                            
                            <button id="btn-part" class="btn btn-continuar" onclick="App.salvarNicknameParticipante()">Continuar</button>
                            <button class="btn btn-marrom" onclick="App.irPara('abertura')">Voltar</button>

                            <div id="overlay-nick" class="overlay hidden">
                                <h2>Nome de Usuário</h2>
                                <input type="text" id="nick-p" placeholder="Seu Nickname">
                                <button class="btn btn-verde" onclick="App.finalizarLogin()">Salvar</button>
                            </div>
                        </div>
                    </div>
                `;
            },

            // Lógica de validação (Amarelo ao digitar)
            validarLogin() {
                const e = document.getElementById('email').value;
                const s = document.getElementById('senha').value;
                const btn = document.getElementById('btn-login');
                if(e.length > 0 && s.length > 0) btn.classList.add('btn-ativo');
                else btn.classList.remove('btn-ativo');
            },

            validarParticipante() {
                const c = document.getElementById('cod').value;
                const btn = document.getElementById('btn-part');
                if(c.length > 0) btn.classList.add('btn-ativo');
                else btn.classList.remove('btn-ativo');
            },

            salvarNickname() {
                document.getElementById('overlay-nick').classList.remove('hidden');
            },

            salvarNicknameParticipante() {
                document.getElementById('overlay-nick').classList.remove('hidden');
            },

            finalizarLogin() {
                alert("Etapa 1 Concluída! Nickname salvo. Aguardando Etapa 2...");
                // Aqui depois entraremos na Página Inicial (Floresta 2)
            }
        };

        window.onload = () => App.abertura();
    </script>
</body>
</html>
