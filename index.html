<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest - Sistema de Exploração</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlRyYWlsUXVlc3QiLAogICJzaG9ydF9uYW1lIjogIlRyYWlsUXVlc3QiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzRhN2M1YiIsCiAgInRoZW1lX2NvbG9yIjogIzRhN2M1YiIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzI4NTYvMjg1NjM2Ny5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <style>
        :root {
            --cor-bege: #f5f5dc;
            --cor-verde: #2d5a27;
            --cor-marrom: #5d4037;
            --cor-vermelha: #c62828;
            --font-vintage: 'Crimson Text', serif;
            --font-titulo: 'Dancing Script', cursive;
        }

        /* RESET E ESTRUTURA BASE */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: var(--font-vintage);
        }

        /* FUNDO DE FLORESTA - Z-INDEX 0 */
        .bg-floresta {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* CABEÇALHO - Z-INDEX 1000 */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            z-index: 1000;
            pointer-events: none; /* Não bloqueia toques no mapa */
        }

        header h1 {
            font-family: var(--font-titulo);
            color: white;
            font-size: 2.8rem;
            margin: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.9);
        }

        /* PÁGINAS DO SISTEMA */
        .page {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        /* A página do mapa precisa estar visível mas sem fundo para mostrar o Leaflet abaixo */
        .page#page-mapa {
            background: transparent;
        }

        .page.active {
            display: flex;
        }

        /* MAPA LEAFLET - Z-INDEX 1 */
        #map {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 100%;
            height: 100vh; /* Altura garantida */
            z-index: 1;
        }

        /* BOTÕES FLUTUANTES NO MAPA */
        .btn-posicao {
            position: absolute;
            bottom: 110px;
            right: 20px;
            z-index: 2000;
            background-color: var(--cor-bege);
            border: 2px solid var(--cor-verde);
            padding: 12px 18px;
            border-radius: 50px;
            font-weight: bold;
            color: var(--cor-verde);
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            cursor: pointer;
            font-family: var(--font-vintage);
        }

        /* MENU DE INTERAÇÃO DO PONTO (MODAL) */
        #menu-ponto {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--cor-bege);
            padding: 20px;
            border-radius: 20px;
            border: 3px solid var(--cor-marrom);
            z-index: 5000;
            width: 85%;
            max-width: 300px;
            box-shadow: 0 0 100px rgba(0,0,0,0.7);
            text-align: center;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            background-color: var(--cor-verde);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            font-family: var(--font-vintage);
            cursor: pointer;
        }

        .menu-btn.excluir { background-color: var(--cor-vermelha); }
        .menu-btn.voltar { background-color: var(--cor-marrom); }

        .input-menu {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--cor-marrom);
            border-radius: 5px;
            font-family: var(--font-vintage);
        }

        /* CARTÕES DE INTERFACE (PERFIL/ATIVIDADES) */
        .card {
            background-color: var(--cor-bege);
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.6);
            text-align: center;
            border: 2px solid var(--cor-marrom);
            z-index: 20;
        }

        /* MENU INFERIOR - Z-INDEX 3000 */
        nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background-color: rgba(245, 245, 220, 0.98);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-radius: 40px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
            z-index: 3000;
            border: 1px solid var(--cor-marrom);
        }

        .nav-item {
            color: var(--cor-marrom);
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: var(--cor-verde);
            text-decoration: underline;
        }

        /* ESTILO DOS MARCADORES DE PONTOS */
        .marker-ponto {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.6);
        }
    </style>
</head>
<body>

    <div class="bg-floresta"></div>

    <header>
        <h1>TrailQuest</h1>
    </header>

    <div id="menu-ponto">
        <h3 id="menu-titulo" style="color: var(--cor-marrom); margin: 0 0 15px 0;">Ponto</h3>
        <div id="container-inputs"></div>
        <button class="menu-btn" onclick="acaoNomear()">Nomear</button>
        <button class="menu-btn" onclick="acaoNumerar()">Numerar</button>
        <button class="menu-btn excluir" onclick="acaoExcluir()">Excluir</button>
        <button class="menu-btn voltar" onclick="fecharMenuPonto()">Voltar</button>
    </div>

    <main id="page-mapa" class="page active">
        <div id="map"></div>
        <button class="btn-posicao" onclick="centralizarMapa()">Minha posição</button>
    </main>

    <section id="page-atividades" class="page">
        <div class="card">
            <h2 style="color: var(--cor-marrom)">Histórico de Atividades</h2>
            <p>Seu rastro na floresta aparecerá aqui em breve.</p>
        </div>
    </section>

    <section id="page-perfil" class="page">
        <div class="card">
            <h2 style="color: var(--cor-marrom)">Perfil de Explorador</h2>
            <div style="text-align: left; margin: 15px 0;">
                <p><strong>Nickname:</strong> Explorador_Raiz</p>
                <p><strong>Email:</strong> usuario@trailquest.com</p>
            </div>
        </div>
    </section>

    <nav>
        <div class="nav-item active" onclick="switchPage('page-mapa', this)">Mapa</div>
        <div class="nav-item" onclick="switchPage('page-atividades', this)">Atividades</div>
        <div class="nav-item" onclick="switchPage('page-perfil', this)">Perfil</div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        // CONFIGURAÇÕES GLOBAIS DO ENGENHEIRO
        let map;
        let userMarker;
        let userLocation = [-23.5505, -46.6333]; // Coordenada base (SP)
        let numeroObjetivos = 20; // Limite de pontos
        let listaPontos = []; 
        let pontoSelecionado = null;
        let corAtualMapa = 'verde';
        const coresHex = { 'verde': '#2d5a27', 'vermelho': '#c62828', 'azul': '#1565c0', 'amarelo': '#fbc02d', 'preto': '#212121' };

        // GARANTIR QUE TUDO RODE APÓS O CARREGAMENTO DO DOM
        document.addEventListener("DOMContentLoaded", function() {
            initTrailQuest();
        });

        function initTrailQuest() {
            console.log("Iniciando TrailQuest...");
            
            // 1. Inicialização do Mapa
            map = L.map('map', {
                zoomControl: false,
                tap: true,
                dragging: true
            }).setView(userLocation, 16);

            // 2. Camada Satélite
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19,
                attribution: 'TrailQuest Satellite'
            }).addTo(map);

            // 3. Marcador do Usuário
            const userIcon = L.divIcon({
                className: 'user-icon',
                html: `<div style="background-color:#2196F3; width:16px; height:16px; border-radius:50%; border:3px solid white; box-shadow: 0 0 8px rgba(0,0,0,0.5);"></div>`,
                iconSize: [16, 16]
            });
            userMarker = L.marker(userLocation, { icon: userIcon }).addTo(map);

            // 4. Evento de toque no mapa para criar pontos
            map.on('click', function(e) {
                // Previne criação de pontos se o clique foi em um elemento de UI
                if (e.originalEvent.target.id === 'map' || e.originalEvent.target.classList.contains('leaflet-container')) {
                    criarNovoPonto(e.latlng);
                }
            });

            // 5. Iniciar monitoramento GPS
            iniciarGeolocalizacao();

            // Forçar ajuste de tamanho após renderização inicial
            setTimeout(() => { map.invalidateSize(); }, 500);
        }

        /* --- SISTEMA DE PONTOS --- */
        function criarNovoPonto(latlng) {
            if (listaPontos.length >= numeroObjetivos) {
                alert("Você atingiu o limite de objetivos para este mapa!");
                return;
            }

            const novoNumero = listaPontos.length + 1;
            const pontoObj = {
                id: Date.now(),
                latlng: latlng,
                nome: "Ponto " + novoNumero,
                numero: novoNumero,
                marker: null
            };

            const marker = adicionarMarkerAoMapa(pontoObj);
            pontoObj.marker = marker;
            listaPontos.push(pontoObj);
        }

        function adicionarMarkerAoMapa(pontoObj) {
            const iconHtml = L.divIcon({
                className: 'marker-ponto',
                html: `<div style="background-color:${coresHex[corAtualMapa]}; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white;">${pontoObj.numero}</div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 16]
            });

            const marker = L.marker(pontoObj.latlng, { icon: iconHtml }).addTo(map);
            
            // Clique no marcador para abrir o menu
            marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                abrirMenuPonto(pontoObj);
            });

            return marker;
        }

        /* --- MENU DO PONTO --- */
        function abrirMenuPonto(pontoObj) {
            pontoSelecionado = pontoObj;
            document.getElementById('menu-titulo').innerText = pontoObj.nome;
            document.getElementById('container-inputs').innerHTML = '';
            document.getElementById('menu-ponto').style.display = 'block';
        }

        function fecharMenuPonto() {
            document.getElementById('menu-ponto').style.display = 'none';
            pontoSelecionado = null;
        }

        function acaoNomear() {
            const container = document.getElementById('container-inputs');
            container.innerHTML = `
                <input type="text" id="input-nome" class="input-menu" placeholder="Nome do local..." value="${pontoSelecionado.nome}">
                <button class="menu-btn" onclick="confirmarNome()">Confirmar</button>
            `;
        }

        function confirmarNome() {
            const novoNome = document.getElementById('input-nome').value;
            if (novoNome) {
                pontoSelecionado.nome = novoNome;
                document.getElementById('menu-titulo').innerText = novoNome;
                document.getElementById('container-inputs').innerHTML = '';
            }
        }

        function acaoNumerar() {
            const container = document.getElementById('container-inputs');
            container.innerHTML = `
                <input type="number" id="input-num" class="input-menu" placeholder="Novo número (1-${numeroObjetivos})">
                <button class="menu-btn" onclick="confirmarTrocaNumero()">Trocar</button>
            `;
        }

        function confirmarTrocaNumero() {
            const novoNum = parseInt(document.getElementById('input-num').value);
            if (isNaN(novoNum) || novoNum < 1 || novoNum > numeroObjetivos) {
                alert("Número inválido!");
                return;
            }

            // Lógica de Troca Automática
            const pontoAlvo = listaPontos.find(p => p.numero === novoNum && p.id !== pontoSelecionado.id);
            if (pontoAlvo) {
                pontoAlvo.numero = pontoSelecionado.numero;
                atualizarVisualMarker(pontoAlvo);
            }

            pontoSelecionado.numero = novoNum;
            atualizarVisualMarker(pontoSelecionado);
            fecharMenuPonto();
        }

        function acaoExcluir() {
            map.removeLayer(pontoSelecionado.marker);
            listaPontos = listaPontos.filter(p => p.id !== pontoSelecionado.id);
            
            // Reorganização sequencial automática
            listaPontos.sort((a, b) => a.numero - b.numero);
            listaPontos.forEach((p, index) => {
                p.numero = index + 1;
                atualizarVisualMarker(p);
            });
            
            fecharMenuPonto();
        }

        function atualizarVisualMarker(pontoObj) {
            pontoObj.marker.setIcon(L.divIcon({
                className: 'marker-ponto',
                html: `<div style="background-color:${coresHex[corAtualMapa]}; width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white;">${pontoObj.numero}</div>`,
                iconSize: [32, 32],
                iconAnchor: [16, 16]
            }));
        }

        /* --- GPS E UTILITÁRIOS --- */
        function iniciarGeolocalizacao() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((pos) => {
                    userLocation = [pos.coords.latitude, pos.coords.longitude];
                    userMarker.setLatLng(userLocation);
                }, (err) => console.error("Erro GPS:", err), {
                    enableHighAccuracy: true,
                    maximumAge: 5000
                });
            }
        }

        function centralizarMapa() {
            map.setView(userLocation, 17);
        }

        function switchPage(pageId, element) {
            // UI Update
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');

            // Bug fix do Leaflet: re-renderizar mapa ao voltar para aba mapa
            if (pageId === 'page-mapa') {
                setTimeout(() => { map.invalidateSize(); }, 300);
            }
        }

        /* --- SERVICE WORKER (PWA) --- */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const swContent = `
                    self.addEventListener('install', e => self.skipWaiting());
                    self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
                `;
                const blob = new Blob([swContent], { type: 'application/javascript' });
                const swUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(swUrl);
            });
        }
    </script>
</body>
</html>
