<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Pro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@700&family=Special+Elite&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --verde: #2e7d32;
            --marrom: #3e2723;
            --creme-bg: #f5f5dc;
            --creme-painel: rgba(255, 253, 231, 0.96);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { height: 100%; width: 100%; font-family: 'Special Elite', serif; background: #1a1a1a; overflow: hidden; }

        .fonte-manuscrita { font-family: 'Dancing Script', cursive; }
        .fonte-forte { font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        .cenario {
            width: 100vw; height: 100vh;
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
        }

        .bg-inicio { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000'); }
        .bg-menu { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1448375240586-882707db888b?q=80&w=1000'); }

        .painel-vintage {
            background: var(--creme-painel);
            border: 3px solid var(--marrom);
            padding: 25px; border-radius: 5px;
            width: 85%; max-width: 380px;
            box-shadow: 8px 8px 0px var(--marrom);
            text-align: center;
            z-index: 10;
        }

        /* Container do Mapa */
        #map-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; display: none; background: #000;
        }
        #map { width: 100%; height: 100%; }
        
        .map-overlay {
            position: absolute; top: 15px; left: 15px; right: 15px;
            z-index: 10000; display: flex; flex-direction: column; gap: 10px;
            pointer-events: none;
        }
        .map-btn {
            pointer-events: auto; padding: 12px; background: var(--marrom);
            color: white; border: 2px solid white; font-family: 'Montserrat'; 
            font-weight: bold; border-radius: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            font-size: 0.8rem;
        }
        .btn-gps { background: #1976d2; }

        h1, h2 { color: var(--verde); margin-bottom: 15px; font-size: 2.8rem; line-height: 1; }
        input {
            width: 100%; padding: 12px; margin: 8px 0;
            border: 1px solid var(--marrom); background: rgba(255,255,255,0.4);
            font-family: 'Special Elite', serif; text-align: center; font-size: 1rem;
        }
        .btn-v {
            width: 100%; padding: 15px; margin-top: 12px;
            border: 2px solid var(--marrom); background: var(--verde);
            color: white; cursor: pointer; font-weight: bold; text-transform: uppercase;
        }
        .btn-desativado { background: rgba(0,0,0,0.1) !important; color: rgba(0,0,0,0.3) !important; border-color: rgba(0,0,0,0.1) !important; }
        .hidden { display: none; }
        .campo-container { text-align: left; margin-top: 10px; }
        .olhinho { cursor: pointer; float: right; margin-top: -38px; margin-right: 10px; font-size: 1.2rem; }
        label { font-size: 0.9rem; color: var(--marrom); font-weight: bold; }
    </style>
</head>
<body>

    <div id="app-root"></div>

    <div id="map-container">
        <div class="map-overlay">
            <button class="map-btn" onclick="App.fecharMapa()">← SALVAR E VOLTAR</button>
            <button class="map-btn btn-gps" onclick="App.localizarUsuario()">📍 MINHA POSIÇÃO</button>
        </div>
        <div id="map"></div>
    </div>

    <script>
        const App = {
            root: document.getElementById('app-root'),
            usuarioLogado: false,
            mapa: null,
            marcos: [],
            meuCirculo: null,

            telas: {
                inicio: () => `
                    <div class="cenario bg-inicio">
                        <div class="painel-vintage">
                            <h1 class="fonte-manuscrita">TrailQuest</h1>
                            <button class="btn-v fonte-forte" onclick="App.navegar('login')">Fazer Login</button>
                            <button class="btn-v fonte-forte" style="background:#795548" onclick="App.navegar('participanteAcesso')">Continuar como Participante</button>
                        </div>
                    </div>`,
                
                login: () => `
                    <div class="cenario bg-inicio">
                        <div class="painel-vintage">
                            <h2 class="fonte-manuscrita">Bem-vindos</h2>
                            <div style="text-align:left">
                                <label class="fonte-forte">E-mail</label>
                                <input type="email">
                                <label class="fonte-forte">Senha</label>
                                <input type="password" id="senha">
                                <span class="olhinho" onclick="App.verSenha()">👁️</span>
                            </div>
                            <button class="btn-v fonte-forte" onclick="App.fazerLogin()">Entrar</button>
                        </div>
                    </div>`,

                menuInicial: () => `
                    <div class="cenario bg-menu">
                        <div class="painel-vintage">
                            <button class="btn-v fonte-forte" onclick="App.navegar('mestre')">Organizador</button>
                            <button class="btn-v fonte-forte" onclick="App.navegar('participanteAcesso')">Participante</button>
                        </div>
                    </div>`,

                mestre: () => `
                    <div class="cenario bg-menu">
                        <div class="painel-vintage">
                            <h2 class="fonte-manuscrita">Mestre</h2>
                            <button class="btn-v fonte-forte" onclick="App.navegar('percursos')">Organizar Percursos</button>
                            <button class="btn-v fonte-forte" onclick="App.navegar('grupos')">Organizar Grupos</button>
                            <button class="btn-v fonte-forte" style="background:#6d4c41" onclick="App.navegar('menuInicial')">Voltar</button>
                        </div>
                    </div>`,

                grupos: () => `
                    <div class="cenario bg-menu">
                        <div class="painel-vintage">
                            <h2 class="fonte-manuscrita">Grupos</h2>
                            <div class="campo-container">
                                <label class="fonte-forte">Número de grupos:</label>
                                <input type="number" id="nGrupos" oninput="App.logicaGrupos()">
                            </div>
                            <div id="boxPessoas" class="hidden campo-container">
                                <label class="fonte-forte">Pessoas por grupo:</label>
                                <input type="number" id="nPessoas" oninput="App.logicaGrupos()">
                            </div>
                            <div id="boxImpar" class="hidden campo-container">
                                <input type="text" placeholder="">
                            </div>
                            <div id="boxLideres" class="hidden campo-container">
                                <label class="fonte-forte">Líderes por grupo:</label>
                                <input type="number">
                            </div>
                            <button id="btnConfirmar" class="hidden btn-v fonte-forte" onclick="App.navegar('mestre')">Confirmar</button>
                        </div>
                    </div>`,

                percursos: () => `
                    <div class="cenario bg-menu">
                        <div class="painel-vintage">
                            <h2 class="fonte-manuscrita">Percursos</h2>
                            <div class="campo-container">
                                <label class="fonte-forte">Objetivos Fixos:</label>
                                <input type="number" id="fixos" oninput="App.logicaPercurso()">
                            </div>
                            <div id="boxMoveis" class="hidden campo-container">
                                <label class="fonte-forte">Objetivos Móveis:</label>
                                <input type="number" id="moveis">
                                <button class="btn-v fonte-forte" style="background:#ffa000" onclick="App.abrirMapa()">Configurar Mapas</button>
                            </div>
                            <button class="btn-v fonte-forte" style="background:#6d4c41; margin-top:20px" onclick="App.navegar('mestre')">Voltar</button>
                        </div>
                    </div>`,

                participanteAcesso: () => `
                    <div class="cenario bg-inicio">
                        <div class="painel-vintage" style="background:#f5f5dc !important">
                            <h2 class="fonte-manuscrita">Código de Acesso</h2>
                            <input type="text" id="codInput" maxlength="6" oninput="App.validarCodigo(this)">
                            <button id="btnContinuar" class="btn-v btn-desativado fonte-forte" onclick="App.confirmarAcesso()">Continuar</button>
                            <button class="btn-v fonte-forte" style="background:none; color:var(--marrom); border:none; font-size:0.7rem" 
                                onclick="App.navegar(App.usuarioLogado ? 'menuInicial' : 'inicio')">Voltar</button>
                        </div>
                    </div>`
            },

            navegar(tela) {
                this.root.innerHTML = this.telas[tela]();
            },

            fazerLogin() { this.usuarioLogado = true; this.navegar('menuInicial'); },
            verSenha() { const s = document.getElementById('senha'); s.type = s.type === 'password' ? 'text' : 'password'; },

            logicaGrupos() {
                const nG = parseInt(document.getElementById('nGrupos').value) || 0;
                const nP = parseInt(document.getElementById('nPessoas').value) || 0;
                const boxP = document.getElementById('boxPessoas'), boxI = document.getElementById('boxImpar'), boxL = document.getElementById('boxLideres'), btnC = document.getElementById('btnConfirmar');
                if(nG >= 2) boxP.classList.remove('hidden'); else { boxP.classList.add('hidden'); return; }
                if(nP >= 1) { btnC.classList.remove('hidden'); if (nP >= 2) { boxI.classList.remove('hidden'); boxL.classList.remove('hidden'); } else { boxI.classList.add('hidden'); boxL.classList.add('hidden'); } } else { btnC.classList.add('hidden'); }
            },

            logicaPercurso() {
                const f = document.getElementById('fixos').value;
                if(f && f > 0) document.getElementById('boxMoveis').classList.remove('hidden');
                else document.getElementById('boxMoveis').classList.add('hidden');
            },

            validarCodigo(input) {
                const btn = document.getElementById('btnContinuar');
                if (input.value.length === 6) { btn.classList.remove('btn-desativado'); btn.style.background = "var(--verde)"; }
                else { btn.classList.add('btn-desativado'); btn.style.background = "rgba(0,0,0,0.1)"; }
            },

            confirmarAcesso() { if (!document.getElementById('btnContinuar').classList.contains('btn-desativado')) alert("Acesso Autorizado!"); },

            // --- SISTEMA DE MAPAS E LOCALIZAÇÃO ---
            solicitarPermissaoGPS() {
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        () => console.log("GPS ok"),
                        () => alert("Ative o GPS para localizar sua posição exata na trilha."),
                        { enableHighAccuracy: true, timeout: 5000 }
                    );
                }
            },

            abrirMapa() {
                document.getElementById('map-container').style.display = 'block';
                if (!this.mapa) {
                    // Centro inicial padrão
                    this.mapa = L.map('map').setView([-12.5, -38.3], 13);
                    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                        attribution: 'Esri World Imagery'
                    }).addTo(this.mapa);

                    this.mapa.on('click', (e) => {
                        const { lat, lng } = e.latlng;
                        L.marker([lat, lng]).addTo(this.mapa).bindPopup(`Objetivo ${this.marcos.length + 1}`).openPopup();
                        this.marcos.push({ lat, lng });
                    });
                }
                setTimeout(() => { this.mapa.invalidateSize(); }, 300);
            },

            localizarUsuario() {
                if (!navigator.geolocation) { alert("Navegador sem suporte a GPS."); return; }

                const btn = document.querySelector('.btn-gps');
                const originalText = btn.innerText;
                btn.innerText = "🔍 BUSCANDO SATÉLITE...";

                const gpsOptions = {
                    enableHighAccuracy: true,
                    timeout: 15000,
                    maximumAge: 0
                };

                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const { latitude, longitude, accuracy } = pos.coords;
                        
                        if (this.meuCirculo) this.mapa.removeLayer(this.meuCirculo);

                        this.mapa.setView([latitude, longitude], 17);

                        this.meuCirculo = L.circle([latitude, longitude], {
                            radius: accuracy,
                            color: '#1976d2',
                            fillColor: '#1976d2',
                            fillOpacity: 0.3
                        }).addTo(this.mapa).bindPopup(`Você está aqui (Precisão: ${Math.round(accuracy)}m)`).openPopup();

                        btn.innerText = originalText;
                    },
                    (err) => {
                        btn.innerText = originalText;
                        alert("Erro de Sinal: Vá para um local aberto e verifique se o GPS está em 'Alta Precisão'.");
                    },
                    gpsOptions
                );
            },

            fecharMapa() { document.getElementById('map-container').style.display = 'none'; }
        };

        window.onload = () => {
            App.navegar('inicio');
            App.solicitarPermissaoGPS();
        };
    </script>
    <script>
    // Esta parte garante que a função antiga seja substituída pela nova com diagnóstico
    if (typeof App !== 'undefined') {
        
        App.localizarUsuario = function() {
            if (!navigator.geolocation) {
                alert("ERRO: O seu navegador não tem suporte para GPS.");
                return;
            }

            const btn = document.querySelector('.btn-gps');
            const textoOriginal = btn ? btn.innerText : "📍 MINHA POSIÇÃO";
            if(btn) btn.innerText = "🔍 ACESSANDO SATÉLITE...";

            const sucesso = (pos) => {
                const { latitude, longitude, accuracy } = pos.coords;
                
                // Limpa círculo anterior se existir
                if (this.meuCirculo) this.mapa.removeLayer(this.meuCirculo);
                
                // Foca o mapa na posição real
                this.mapa.setView([latitude, longitude], 17);
                
                // Desenha o marcador de precisão
                this.meuCirculo = L.circle([latitude, longitude], {
                    radius: accuracy,
                    color: '#1976d2',
                    fillOpacity: 0.3
                }).addTo(this.mapa).bindPopup(`Você está aqui (Precisão: ${Math.round(accuracy)}m)`).openPopup();
                
                if(btn) btn.innerText = textoOriginal;
            };

            const erro = (err) => {
                if(btn) btn.innerText = textoOriginal;
                
                // DIAGNÓSTICO REAL
                switch(err.code) {
                    case 1:
                        alert("PERMISSÃO NEGADA: O seu navegador ou celular bloqueou o GPS. \n\nSOLUÇÃO: Vá nas configurações do Chrome > Configurações do Site > Localização e permita este site.");
                        break;
                    case 2:
                        alert("SINAL INDISPONÍVEL: Não foi possível detectar os satélites. \n\nSOLUÇÃO: Saia de ambientes cobertos ou ligue o GPS do celular.");
                        break;
                    case 3:
                        alert("TEMPO ESGOTADO: O GPS demorou muito a responder. Tente novamente em local aberto.");
                        break;
                    default:
                        alert("ERRO: " + err.message);
                }
            };

            // Executa a busca com máxima prioridade de hardware
            navigator.geolocation.getCurrentPosition(sucesso, erro, {
                enableHighAccuracy: true,
                timeout: 15000,
                maximumAge: 0
            });
        };

        console.log("Sistema de localização atualizado com sucesso!");
    }
</script>
<script>
    if (typeof App !== 'undefined') {
        
        // Sobrescrevemos a função abrirMapa para incluir a lógica de edição
        const originalAbrirMapa = App.abrirMapa;
        
        App.abrirMapa = function() {
            // Chama a função original primeiro
            originalAbrirMapa.apply(this);
            
            // Removemos o evento de clique antigo para não duplicar pontos
            this.mapa.off('click');
            
            // Novo evento de clique com funções de edição
            this.mapa.on('click', (e) => {
                const { lat, lng } = e.latlng;
                this.adicionarPontoEditavel(lat, lng);
            });
        };

        App.adicionarPontoEditavel = function(lat, lng) {
            const id = Date.now(); // ID único para o ponto
            
            // Cria o marcador configurado para ser arrastável
            const marker = L.marker([lat, lng], {
                draggable: true,
                autoPan: true
            }).addTo(this.mapa);

            const atualizarPopup = () => {
                const pos = marker.getLatLng();
                const conteudo = `
                    <div style="text-align:center; font-family:'Montserrat',sans-serif;">
                        <b style="color:var(--verde)">Objetivo</b><br>
                        <small>${pos.lat.toFixed(5)}, ${pos.lng.toFixed(5)}</small><br><br>
                        <button onclick="App.removerPonto(${id})" 
                            style="background:#d32f2f; color:white; border:none; padding:5px 10px; border-radius:3px; cursor:pointer;">
                            🗑️ EXCLUIR
                        </button>
                    </div>
                `;
                marker.bindPopup(conteudo).openPopup();
            };

            // Evento: Quando terminar de arrastar, atualiza a posição na lista
            marker.on('dragend', function() {
                atualizarPopup();
                App.salvarEstadoPontos();
            });

            // Guarda o marcador num array com o seu ID
            this.marcos.push({ id: id, marker: marker });
            atualizarPopup();
            this.salvarEstadoPontos();
        };

        App.removerPonto = function(id) {
            const index = this.marcos.findIndex(m => m.id === id);
            if (index !== -1) {
                this.mapa.removeLayer(this.marcos[index].marker);
                this.marcos.splice(index, 1);
                this.salvarEstadoPontos();
            }
        };

        App.salvarEstadoPontos = function() {
            // Aqui você pode adicionar lógica para salvar no LocalStorage se desejar
            console.log("Pontos atuais:", this.marcos.map(m => m.marker.getLatLng()));
        };
    }
</script>
<script>
    if (typeof App !== 'undefined') {
        // Ajuste de fonte global para campos de entrada conforme solicitado
        const style = document.createElement('style');
        style.innerHTML = `input, select, textarea { font-family: 'Roboto', 'Canvas', sans-serif !important; }`;
        document.head.appendChild(style);

        // Extensão do objeto App para novas funcionalidades
        App.linhaRoteiro = null;
        
        const originalAbrirMapa = App.abrirMapa;
        App.abrirMapa = function() {
            originalAbrirMapa.apply(this);
            this.mapa.off('click');
            this.mapa.on('click', (e) => {
                const limite = parseInt(document.getElementById('fixos').value) || 0;
                if (this.marcos.length >= limite) {
                    alert("Limite atingido! Você só pode marcar " + limite + " pontos (conforme Objetivos Fixos).");
                    return;
                }
                this.adicionarPontoAvancado(e.latlng.lat, e.latlng.lng);
            });
            this.desenharLinhaRoteiro();
        };

        App.adicionarPontoAvancado = function(lat, lng) {
            const id = Date.now();
            const ordem = this.marcos.length + 1;
            
            const marker = L.marker([lat, lng], {
                draggable: true
            }).addTo(this.mapa);

            const ponto = {
                id: id,
                nome: "Ponto " + ordem,
                ordem: ordem,
                marker: marker,
                codigoQR: `TQ-${id}-${ordem}`
            };

            marker.on('dragend', () => {
                this.desenharLinhaRoteiro();
                this.atualizarPopup(ponto);
            });

            this.marcos.push(ponto);
            this.atualizarPopup(ponto);
            this.desenharLinhaRoteiro();
        };

        App.atualizarPopup = function(ponto) {
            const conteudo = `
                <div style="font-family:'Roboto',sans-serif; min-width:150px;">
                    <label style="font-size:10px; font-weight:bold;">NOME DO PONTO:</label><br>
                    <input type="text" value="${ponto.nome}" onchange="App.editarNome(${ponto.id}, this.value)" 
                        style="width:100%; margin-bottom:5px; text-align:left; padding:4px;"><br>
                    
                    <label style="font-size:10px; font-weight:bold;">ORDEM NO ROTEIRO:</label><br>
                    <input type="number" value="${ponto.ordem}" onchange="App.alterarOrdem(${ponto.id}, this.value)"
                        style="width:100%; margin-bottom:10px; text-align:left; padding:4px;"><br>
                    
                    <div style="background:#eee; padding:5px; font-size:9px; border-radius:3px; margin-bottom:10px;">
                        <strong>QR CODE:</strong><br>${ponto.codigoQR}
                    </div>

                    <button onclick="App.removerPonto(${ponto.id})" 
                        style="background:#d32f2f; color:white; border:none; width:100%; padding:8px; border-radius:3px; font-weight:bold;">
                        EXCLUIR PONTO
                    </button>
                </div>
            `;
            ponto.marker.bindPopup(conteudo).openPopup();
        };

        App.editarNome = function(id, novoNome) {
            const p = this.marcos.find(m => m.id === id);
            if (p) p.nome = novoNome;
        };

        App.alterarOrdem = function(id, novaOrdem) {
            const p = this.marcos.find(m => m.id === id);
            if (p) {
                p.ordem = parseInt(novaOrdem);
                // Reordenar array baseado na nova ordem
                this.marcos.sort((a, b) => a.ordem - b.ordem);
                this.desenharLinhaRoteiro();
            }
        };

        App.desenharLinhaRoteiro = function() {
            if (this.linhaRoteiro) this.mapa.removeLayer(this.linhaRoteiro);
            
            const coordenadas = this.marcos
                .sort((a, b) => a.ordem - b.ordem)
                .map(p => p.marker.getLatLng());

            if (coordenadas.length > 1) {
                this.linhaRoteiro = L.polyline(coordenadas, {
                    color: '#ffa000',
                    weight: 4,
                    opacity: 0.7,
                    dashArray: '10, 10'
                }).addTo(this.mapa);
            }
        };

        App.removerPonto = function(id) {
            const idx = this.marcos.findIndex(m => m.id === id);
            if (idx !== -1) {
                this.mapa.removeLayer(this.marcos[idx].marker);
                this.marcos.splice(idx, 1);
                this.desenharLinhaRoteiro();
            }
        };
    }
</script>

</body>
</html>
