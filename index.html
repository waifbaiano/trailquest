<div id="screen-groups" class="screen bg-paper">
    <div class="vintage-box">
        <h3 class="handwritten">Equipes</h3>
        <label class="label-small">Número de Grupos:</label>
        <input type="number" id="group-qty" placeholder="Ex: 4" oninput="checkGroups()">
        
        <div id="groups-setup-area" style="display:none; margin-top: 10px;">
            <p style="font-size: 0.7rem; color: #5d4037;">Defina os nomes das equipes:</p>
            <div id="groups-inputs-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 10px;">
                </div>
        </div>
        
        <button id="btn-save-groups" class="btn-inactive" disabled onclick="saveGroupsData()">Confirmar Grupos</button>
        <button class="back-link" onclick="showScreen('screen-main-menu')">Voltar</button>
    </div>
</div>

<div id="screen-map-config" class="screen bg-paper">
    <div class="vintage-box" style="max-width: 95%; width: 95%;">
        <h3 class="handwritten">Marcar Pontos</h3>
        
        <div id="upload-area">
            <input type="file" id="map-upload" accept="image/*" style="display:none;" onchange="handleMapUpload(event)">
            <button class="btn-vintage" onclick="document.getElementById('map-upload').click()">Subir Imagem do Mapa</button>
        </div>

        <div id="editor-container" style="display:none; position: relative; margin-top: 10px;">
            <canvas id="map-canvas" style="width: 100%; border: 2px solid #3e2723; border-radius: 5px; cursor: crosshair;"></canvas>
            <p style="font-size: 0.7rem; margin-top: 5px;">Toque no mapa para marcar os <span id="points-needed">0</span> pontos.</p>
        </div>

        <button id="btn-save-map" class="btn-inactive" disabled onclick="saveMapPoints()">Salvar Coordenadas</button>
        <button class="back-link" onclick="showScreen('screen-objectives')">Cancelar</button>
    </div>
</div>
