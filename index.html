<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlRyYWlsUXVlc3QiLAogICJzaG9ydF9uYW1lIjogIlRyYWlsUXVlc3QiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzRhN2M1YiIsCiAgInRoZW1lX2NvbG9yIjogIzRhN2M1YiIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzI4NTYvMjg1NjM2Ny5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <style>
        /* --- ESTILOS GERAIS --- */
        :root {
            --cor-bege: #f5f5dc;
            --cor-verde: #2d5a27;
            --cor-marrom: #5d4037;
            --cor-amarela: #fbc02d;
            --cor-vermelha: #c62828;
            --font-vintage: 'Crimson Text', serif;
            --font-titulo: 'Dancing Script', cursive;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-vintage);
            background-color: #000;
        }

        .bg-floresta {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        /* --- CABEÇALHO --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            text-align: center;
            padding: 15px 0;
            z-index: 1000;
            pointer-events: none;
        }

        h1 {
            font-family: var(--font-titulo);
            color: white;
            font-size: 3rem;
            margin: 0;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }

        /* --- CONTAINER DE PÁGINAS --- */
        .page {
            display: none;
            height: 100vh;
            width: 100vw;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding-top: 80px;
            box-sizing: border-box;
        }

        .page.active {
            display: flex;
        }

        /* --- ESTILO DO MAPA --- */
        #map {
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .btn-posicao {
            position: absolute;
            bottom: 100px;
            right: 20px;
            z-index: 1000;
            background-color: var(--cor-bege);
            border: 2px solid var(--cor-verde);
            padding: 10px 15px;
            border-radius: 50px;
            font-weight: bold;
            color: var(--cor-verde);
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            font-family: var(--font-vintage);
        }

        /* --- MENU DO PONTO (MODAL) --- */
        #menu-ponto {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--cor-bege);
            padding: 20px;
            border-radius: 20px;
            border: 3px solid var(--cor-marrom);
            z-index: 3000;
            width: 80%;
            max-width: 300px;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 10px;
            background-color: var(--cor-verde);
            color: white;
            font-family: var(--font-vintage);
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .menu-btn.excluir { background-color: var(--cor-vermelha); }
        .menu-btn.voltar { background-color: var(--cor-marrom); }

        .input-menu {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--cor-marrom);
            border-radius: 5px;
            font-family: var(--font-vintage);
        }

        /* --- CARTÕES --- */
        .card {
            background-color: var(--cor-bege);
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid var(--cor-marrom);
        }

        /* --- MENU INFERIOR --- */
        nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background-color: rgba(245, 245, 220, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-radius: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            z-index: 2000;
            border: 1px solid var(--cor-marrom);
        }

        .nav-item {
            text-decoration: none;
            color: var(--cor-marrom);
            font-weight: bold;
            cursor: pointer;
        }

        .nav-item.active { color: var(--cor-verde); }

        /* Estilo dos Marcadores de Pontos Numerados */
        .marker-ponto {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="bg-floresta"></div>

    <header>
        <h1>TrailQuest</h1>
    </header>

    <div id="menu-ponto">
        <h3 id="menu-titulo" style="color: var(--cor-marrom); margin-top: 0;">Ponto</h3>
        <div id="container-inputs">
            </div>
        <button class="menu-btn" onclick="acaoNomear()">Nomear</button>
        <button class="menu-btn" onclick="acaoNumerar()">Numerar</button>
        <button class="menu-btn excluir" onclick="acaoExcluir()">Excluir</button>
        <button class="menu-btn voltar" onclick="fecharMenuPonto()">Voltar</button>
    </div>

    <main id="page-mapa" class="page active" style="padding: 0;">
        <div id="map"></div>
        <button class="btn-posicao" onclick="centralizarMapa()">Minha posição</button>
    </main>

    <section id="page-atividades" class="page">
        <div class="card">
            <h2>Histórico de atividades</h2>
            <p>Nenhuma atividade registrada ainda.</p>
        </div>
    </section>

    <section id="page-perfil" class="page">
        <div class="card">
            <h2>Perfil do Aventureiro</h2>
            <div style="text-align: left; margin: 15px 0;">
                <p><strong>Nickname:</strong> Explorador_Raiz</p>
                <p><strong>Email:</strong> usuario@trailquest.com</p>
            </div>
        </div>
    </section>

    <nav>
        <div class="nav-item active" onclick="switchPage('page-mapa', this)"><span>Mapa</span></div>
        <div class="nav-item" onclick="switchPage('page-atividades', this)"><span>Atividades</span></div>
        <div class="nav-item" onclick="switchPage('page-perfil', this)"><span>Perfil</span></div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        /* --- CONFIGURAÇÕES TÉCNICAS --- */
        let map;
        let userMarker;
        let userLocation = [-23.5505, -46.6333];
        
        // Variáveis de Pontos 
        [span_0](start_span)let numeroObjetivos = 15; // Exemplo: limite de 15 pontos[span_0](end_span)
        let listaPontos = []; // Armazena objetos {marker, id, nome, numero}
        let pontoSelecionado = null;
        let corAtualMapa = 'verde'; [span_1](start_span)[span_2](start_span)// verde, vermelho, azul, amarelo, preto[span_1](end_span)[span_2](end_span)

        const coresHex = {
            'verde': '#2d5a27',
            'vermelho': '#c62828',
            'azul': '#1565c0',
            'amarelo': '#fbc02d',
            'preto': '#212121'
        };

        /* --- INICIALIZAÇÃO DO MAPA --- */
        function initMap() {
            map = L.map('map', {
                zoomControl: false,
                tap: false,
                touchZoom: true,
                bounceAtZoomLimits: false 
            }).setView(userLocation, 16);

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            }).addTo(map);

            // Marcador do Usuário
            const userIcon = L.divIcon({
                className: 'u-loc',
                html: `<div style="background-color:#2196F3; width:15px; height:15px; border-radius:50%; border:3px solid white;"></div>`,
                iconSize: [15, 15]
            });
            userMarker = L.marker(userLocation, { icon: userIcon }).addTo(map);

            [span_3](start_span)// EVENTO: CRIAÇÃO DE PONTOS AO TOCAR NO MAPA[span_3](end_span)
            map.on('click', function(e) {
                criarPonto(e.latlng);
            });

            watchPosition();
        }

        /* --- SISTEMA DE PONTOS --- */

        [span_4](start_span)// Criação do ponto numerado[span_4](end_span)
        function criarPonto(latlng) {
            if (listaPontos.length >= numeroObjetivos) {
                alert("Limite de objetivos atingido!");
                return;
            }

            const novoNumero = listaPontos.length + 1;
            const pontoObj = {
                id: Date.now(),
                latlng: latlng,
                nome: "Ponto " + novoNumero,
                numero: novoNumero,
                marker: null
            };

            const marker = renderizarMarker(pontoObj);
            pontoObj.marker = marker;
            listaPontos.push(pontoObj);
        }

        [span_5](start_span)// Renderiza o marcador no mapa com a cor e número[span_5](end_span)
        function renderizarMarker(pontoObj) {
            const iconPonto = L.divIcon({
                className: 'marker-ponto',
                html: `<div style="background-color:${coresHex[corAtualMapa]}; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white;">${pontoObj.numero}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            const marker = L.marker(pontoObj.latlng, { icon: iconPonto }).addTo(map);
            
            [span_6](start_span)// Abrir menu ao tocar no ponto[span_6](end_span)
            marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e); // Evita criar novo ponto ao clicar no existente
                abrirMenuPonto(pontoObj);
            });

            return marker;
        }

        /* --- MENU INTERATIVO DO PONTO --- */

        function abrirMenuPonto(pontoObj) {
            pontoSelecionado = pontoObj;
            document.getElementById('menu-titulo').innerText = pontoObj.nome;
            document.getElementById('container-inputs').innerHTML = ''; // Limpa campos de texto anteriores
            document.getElementById('menu-ponto').style.display = 'block';
        }

        function fecharMenuPonto() {
            document.getElementById('menu-ponto').style.display = 'none';
            pontoSelecionado = null;
        }

        [span_7](start_span)// Função Nomear[span_7](end_span)
        function acaoNomear() {
            const container = document.getElementById('container-inputs');
            if (container.innerHTML === '') {
                container.innerHTML = `<input type="text" id="input-nome" class="input-menu" placeholder="Nome do local (ex: Cantina)" value="${pontoSelecionado.nome}">
                                      <button class="menu-btn" onclick="salvarNome()">Confirmar Nome</button>`;
            }
        }

        function salvarNome() {
            const novoNome = document.getElementById('input-nome').value;
            if (novoNome) {
                pontoSelecionado.nome = novoNome;
                document.getElementById('menu-titulo').innerText = novoNome;
                document.getElementById('container-inputs').innerHTML = '';
            }
        }

        [span_8](start_span)// Função Numerar (Troca de Posição)[span_8](end_span)
        function acaoNumerar() {
            const container = document.getElementById('container-inputs');
            container.innerHTML = `<input type="number" id="input-numero" class="input-menu" placeholder="Novo número (1-${numeroObjetivos})">
                                  <button class="menu-btn" onclick="salvarNumero()">Confirmar Troca</button>`;
        }

        function salvarNumero() {
            const novoNum = parseInt(document.getElementById('input-numero').value);
            
            if (isNaN(novoNum) || novoNum < 1 || novoNum > numeroObjetivos) {
                alert("Número inválido!");
                return;
            }

            [span_9](start_span)// Busca se já existe um ponto com esse número para trocar[span_9](end_span)
            const pontoParaTrocar = listaPontos.find(p => p.numero === novoNum && p.id !== pontoSelecionado.id);

            if (pontoParaTrocar) {
                pontoParaTrocar.numero = pontoSelecionado.numero;
                pontoParaTrocar.marker.setIcon(L.divIcon({
                    className: 'marker-ponto',
                    html: `<div style="background-color:${coresHex[corAtualMapa]}; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white;">${pontoParaTrocar.numero}</div>`,
                    iconSize: [30, 30], iconAnchor: [15, 15]
                }));
            }

            pontoSelecionado.numero = novoNum;
            pontoSelecionado.marker.setIcon(L.divIcon({
                className: 'marker-ponto',
                html: `<div style="background-color:${coresHex[corAtualMapa]}; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white;">${pontoSelecionado.numero}</div>`,
                iconSize: [30, 30], iconAnchor: [15, 15]
            }));

            document.getElementById('container-inputs').innerHTML = '';
            fecharMenuPonto();
        }

        [span_10](start_span)// Função Excluir e Reorganizar[span_10](end_span)
        function acaoExcluir() {
            map.removeLayer(pontoSelecionado.marker);
            listaPontos = listaPontos.filter(p => p.id !== pontoSelecionado.id);
            
            [span_11](start_span)// Reorganiza a sequência numérica automaticamente[span_11](end_span)
            listaPontos.sort((a, b) => a.numero - b.numero);
            listaPontos.forEach((p, index) => {
                p.numero = index + 1;
                p.marker.setIcon(L.divIcon({
                    className: 'marker-ponto',
                    html: `<div style="background-color:${coresHex[corAtualMapa]}; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white;">${p.numero}</div>`,
                    iconSize: [30, 30], iconAnchor: [15, 15]
                }));
            });

            fecharMenuPonto();
        }

        /* --- UTILITÁRIOS E GPS --- */

        function watchPosition() {
            if ("geolocation" in navigator) {
                navigator.geolocation.watchPosition((position) => {
                    userLocation = [position.coords.latitude, position.coords.longitude];
                    userMarker.setLatLng(userLocation);
                }, null, { enableHighAccuracy: true });
            }
        }

        function centralizarMapa() {
            map.setView(userLocation, 17);
        }

        function switchPage(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            element.classList.add('active');
            if (pageId === 'page-mapa') setTimeout(() => map.invalidateSize(), 100);
        }

        window.onload = initMap;
    </script>
</body>
</html>
