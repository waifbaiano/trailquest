<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Pro PWA</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
    <main id="app-container">
        <section id="screen-start" class="screen active">
            <div class="vintage-box">
                <h1>TrailQuest</h1>
                <button class="btn-f" data-nav="screen-login">Fazer Login</button>
                <button class="btn-f secondary" data-nav="screen-guest">Participante</button>
            </div>
        </section>

        <section id="screen-login" class="screen">
            <div class="vintage-box">
                <h2>Acesso Mestre</h2>
                <input type="email" id="login-email" placeholder="E-mail">
                <input type="password" id="login-pass" placeholder="Senha">
                <button class="btn-f" id="btn-do-login">Entrar</button>
                <button class="back-link" data-nav="screen-start">Voltar</button>
            </div>
        </section>

        <section id="screen-map" class="screen">
            <div id="map"></div>
            <div class="map-controls">
                <button id="btn-add-point" class="btn-circle">+</button>
                <button id="btn-save-trail" class="btn-f">Salvar</button>
            </div>
        </section>
    </main>

    <script type="module" src="js/app.js"></script>
</body>
</html>
