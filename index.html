<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <link rel="manifest" href="data:application/manifest+json;base64,ewogICJuYW1lIjogIlRyYWlsUXVlc3QiLAogICJzaG9ydF9uYW1lIjogIlRyYWlsUXVlc3QiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmRhbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzRhN2M1YiIsCiAgInRoZW1lX2NvbG9yIjogIzRhN2M1YiIsCiAgImljb25zIjogWwogICAgewogICAgICAic3JjIjogImh0dHBzOi8vY2RuLWljb25zLXBuZy5mbGF0aWNvbi5jb20vNTEyLzI4NTYvMjg1NjM2Ny5wbmciLAogICAgICAic2l6ZXMiOiAiNTEyeDUxMiIsCiAgICAgICJ0eXBlIjogImltYWdlL3BuZyIKICAgIH0KICBdCn0=">

    <style>
        :root {
            --cor-bege: #f5f5dc;
            --cor-verde: #2d5a27;
            --cor-marrom: #5d4037;
            --cor-amarela: #fbc02d;
            --cor-vermelha: #c62828;
            --font-vintage: 'Crimson Text', serif;
            --font-titulo: 'Dancing Script', cursive;
        }

        /* Correção de Layout: Garante que o corpo ocupe a tela toda */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: var(--font-vintage);
            background-color: #222; /* Fundo escuro base */
        }

        .bg-floresta {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?auto=format&fit=crop&q=80&w=1000');
            background-size: cover;
            background-position: center;
            z-index: 0; /* Fica atrás de tudo */
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            text-align: center;
            padding: 10px 0;
            z-index: 1000;
            pointer-events: none;
        }

        h1 {
            font-family: var(--font-titulo);
            color: white;
            font-size: 2.5rem;
            margin: 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.8);
        }

        /* --- PÁGINAS --- */
        .page {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            z-index: 10;
        }

        .page.active { display: flex; }

        /* Correção: Altura definida para o mapa não colapsar */
        #map {
            width: 100%;
            height: 100%;
            background: #333;
            z-index: 1;
        }

        .btn-posicao {
            position: absolute;
            bottom: 110px;
            right: 20px;
            z-index: 1000;
            background-color: var(--cor-bege);
            border: 2px solid var(--cor-verde);
            padding: 12px;
            border-radius: 50px;
            font-weight: bold;
            color: var(--cor-verde);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            cursor: pointer;
            font-family: var(--font-vintage);
        }

        /* --- MENU DO PONTO --- */
        #menu-ponto {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--cor-bege);
            padding: 20px;
            border-radius: 20px;
            border: 3px solid var(--cor-marrom);
            z-index: 4000;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 0 50px rgba(0,0,0,0.6);
            text-align: center;
        }

        .menu-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            background-color: var(--cor-verde);
            color: white;
            font-weight: bold;
            font-family: var(--font-vintage);
            cursor: pointer;
        }

        .menu-btn.excluir { background-color: var(--cor-vermelha); }
        .menu-btn.voltar { background-color: var(--cor-marrom); }

        .input-menu {
            width: 90%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid var(--cor-marrom);
            border-radius: 5px;
        }

        /* --- INTERFACE --- */
        .card {
            background-color: var(--cor-bege);
            padding: 25px;
            border-radius: 15px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
            text-align: center;
            border: 2px solid var(--cor-marrom);
            z-index: 20;
        }

        nav {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 500px;
            background-color: rgba(245, 245, 220, 0.95);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-radius: 40px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            z-index: 3000;
            border: 1px solid var(--cor-marrom);
        }

        .nav-item {
            color: var(--cor-marrom);
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
        }

        .nav-item.active { color: var(--cor-verde); text-decoration: underline; }

        .marker-ponto {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            border-radius: 50%;
            border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div class="bg-floresta"></div>

    <header>
        <h1>TrailQuest</h1>
    </header>

    <div id="menu-ponto">
        <h3 id="menu-titulo" style="color: var(--cor-marrom); margin: 0 0 15px 0;">Configurar Ponto</h3>
        <div id="container-inputs"></div>
        <button class="menu-btn" onclick="acaoNomear()">Nomear</button>
        <button class="menu-btn" onclick="acaoNumerar()">Numerar</button>
        <button class="menu-btn excluir" onclick="acaoExcluir()">Excluir</button>
        <button class="menu-btn voltar" onclick="fecharMenuPonto()">Voltar</button>
    </div>

    <main id="page-mapa" class="page active">
        <div id="map"></div>
        <button class="btn-posicao" onclick="centralizarMapa()">Minha posição</button>
    </main>

    <section id="page-atividades" class="page">
        <div class="card">
            <h2 style="color: var(--cor-marrom)">Histórico de Atividades</h2>
            <p>Em breve suas trilhas aparecerão aqui.</p>
        </div>
    </section>

    <section id="page-perfil" class="page">
        <div class="card">
            <h2 style="color: var(--cor-marrom)">Meu Perfil</h2>
            <div style="text-align: left; margin: 15px 0;">
                <p><strong>Nickname:</strong> Explorador_Raiz</p>
                <p><strong>Email:</strong> usuario@trailquest.com</p>
            </div>
        </div>
    </section>

    <nav>
        <div class="nav-item active" onclick="switchPage('page-mapa', this)">Mapa</div>
        <div class="nav-item" onclick="switchPage('page-atividades', this)">Atividades</div>
        <div class="nav-item" onclick="switchPage('page-perfil', this)">Perfil</div>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        [span_2](start_span)[span_3](start_span)[span_4](start_span)// Variáveis Globais[span_2](end_span)[span_3](end_span)[span_4](end_span)
        let map;
        let userMarker;
        let userLocation = [-23.5505, -46.6333]; // Padrão
        let numeroObjetivos = 15; 
        let listaPontos = []; 
        let pontoSelecionado = null;
        const coresHex = { 'verde': '#2d5a27', 'vermelho': '#c62828', 'azul': '#1565c0', 'amarelo': '#fbc02d', 'preto': '#212121' };
        let corAtualMapa = 'verde';

        // Correção: Inicialização protegida pelo DOMContentLoaded
        document.addEventListener("DOMContentLoaded", function() {
            initApp();
        });

        function initApp() {
            [span_5](start_span)// Inicializa o Mapa[span_5](end_span)
            map = L.map('map', {
                zoomControl: false,
                tap: true
            }).setView(userLocation, 16);

            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                maxZoom: 19
            }).addTo(map);

            // Marcador do Usuário
            const userIcon = L.divIcon({
                className: 'user-loc',
                html: `<div style="background-color:#2196F3; width:15px; height:15px; border-radius:50%; border:3px solid white;"></div>`,
                iconSize: [15, 15]
            });
            userMarker = L.marker(userLocation, { icon: userIcon }).addTo(map);

            [span_6](start_span)// Clique no Mapa para Pontos[span_6](end_span)
            map.on('click', function(e) {
                criarPonto(e.latlng);
            });

            iniciarGPS();
            
            // Corrige o tamanho do mapa após carregar
            setTimeout(() => { map.invalidateSize(); }, 500);
        }

        function criarPonto(latlng) {
            if (listaPontos.length >= numeroObjetivos) {
                alert("Limite de " + numeroObjetivos + " pontos atingido.");
                return;
            }

            const novoNumero = listaPontos.length + 1;
            const pontoObj = {
                id: Date.now(),
                latlng: latlng,
                nome: "Ponto " + novoNumero,
                numero: novoNumero,
                marker: null
            };

            const marker = renderizarPontoNoMapa(pontoObj);
            pontoObj.marker = marker;
            listaPontos.push(pontoObj);
        }

        function renderizarPontoNoMapa(pontoObj) {
            const iconPonto = L.divIcon({
                className: 'marker-ponto',
                html: `<div style="background-color:${coresHex[corAtualMapa]}; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white;">${pontoObj.numero}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            const marker = L.marker(pontoObj.latlng, { icon: iconPonto }).addTo(map);
            marker.on('click', (e) => {
                L.DomEvent.stopPropagation(e);
                abrirMenuPonto(pontoObj);
            });
            return marker;
        }

        /* --- CONTROLES DE INTERFACE --- */

        function abrirMenuPonto(pontoObj) {
            pontoSelecionado = pontoObj;
            document.getElementById('menu-titulo').innerText = pontoObj.nome;
            document.getElementById('container-inputs').innerHTML = '';
            document.getElementById('menu-ponto').style.display = 'block';
        }

        function fecharMenuPonto() {
            document.getElementById('menu-ponto').style.display = 'none';
        }

        function acaoNomear() {
            document.getElementById('container-inputs').innerHTML = `
                <input type="text" id="input-nome" class="input-menu" placeholder="Ex: Refeitório" value="${pontoSelecionado.nome}">
                <button class="menu-btn" onclick="salvarNome()">Salvar Nome</button>`;
        }

        function salvarNome() {
            const n = document.getElementById('input-nome').value;
            if(n) {
                pontoSelecionado.nome = n;
                document.getElementById('menu-titulo').innerText = n;
                document.getElementById('container-inputs').innerHTML = '';
            }
        }

        function acaoNumerar() {
            document.getElementById('container-inputs').innerHTML = `
                <input type="number" id="input-num" class="input-menu" placeholder="Novo número (1-${numeroObjetivos})">
                <button class="menu-btn" onclick="salvarNumero()">Trocar Ordem</button>`;
        }

        function salvarNumero() {
            const n = parseInt(document.getElementById('input-num').value);
            if (n > 0 && n <= numeroObjetivos) {
                const alvo = listaPontos.find(p => p.numero === n);
                if(alvo && alvo.id !== pontoSelecionado.id) {
                    alvo.numero = pontoSelecionado.numero;
                    atualizarVisualMarker(alvo);
                }
                pontoSelecionado.numero = n;
                atualizarVisualMarker(pontoSelecionado);
                fecharMenuPonto();
            }
        }

        function atualizarVisualMarker(p) {
            p.marker.setIcon(L.divIcon({
                className: 'marker-ponto',
                html: `<div style="background-color:${coresHex[corAtualMapa]}; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid white;">${p.numero}</div>`,
                iconSize: [30, 30], iconAnchor: [15, 15]
            }));
        }

        function acaoExcluir() {
            map.removeLayer(pontoSelecionado.marker);
            listaPontos = listaPontos.filter(p => p.id !== pontoSelecionado.id);
            listaPontos.sort((a,b) => a.numero - b.numero).forEach((p, i) => {
                p.numero = i + 1;
                atualizarVisualMarker(p);
            });
            fecharMenuPonto();
        }

        /* --- SISTEMA E GPS --- */

        function iniciarGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(p => {
                    userLocation = [p.coords.latitude, p.coords.longitude];
                    userMarker.setLatLng(userLocation);
                }, null, { enableHighAccuracy: true });
            }
        }

        function centralizarMapa() {
            map.setView(userLocation, 17);
        }

        function switchPage(pId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            el.classList.add('active');
            if(pId === 'page-mapa') {
                setTimeout(() => map.invalidateSize(), 200);
            }
        }
    </script>
</body>
</html>
