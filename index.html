<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest Pro</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="screen-start" class="screen">
        <div class="box">
            <h1>TrailQuest</h1>
            <button onclick="showScreen('screen-login')">Fazer Login</button>
            <button onclick="showScreen('screen-join-participant')">Continuar como Participante</button>
        </div>
    </div>

    <div id="screen-login" class="screen" style="display:none;">
        <div class="box">
            <h2>Login</h2>
            <input type="email" id="login-email" placeholder="E-mail">
            <input type="password" id="login-pass" placeholder="Senha">
            <button onclick="showScreen('screen-main-menu')">Entrar</button>
            <button class="back" onclick="showScreen('screen-start')">Voltar</button>
        </div>
    </div>

    <div id="screen-main-menu" class="screen" style="display:none;">
        <div class="box">
            <h2>Menu Organizador</h2>
            <button onclick="showScreen('screen-objectives')">Escolher Objetivos</button>
            <button onclick="showScreen('screen-groups')">Organizar Grupos</button>
            <button class="back" onclick="showScreen('screen-start')">Sair</button>
        </div>
    </div>

    <div id="screen-objectives" class="screen" style="display:none;">
        <div class="box">
            <h3>Definição de Objetivos</h3>
            <label>Qtd. Objetivos Fixos:</label>
            <input type="number" id="fixed-obj" min="0">
            
            <label>Qtd. Objetivos Móveis (Obrigatório):</label>
            <input type="number" id="mobile-obj" min="1">
            
            <button onclick="startMapEditor()">Configurar Mapa e Pontos</button>
            <button class="back" onclick="showScreen('screen-main-menu')">Cancelar</button>
        </div>
    </div>

    <div id="screen-groups" class="screen" style="display:none;">
        <div class="box">
            <h3>Organizar Grupos</h3>
            <label>Quantidade de Grupos:</label>
            <input type="number" id="qty-groups" onchange="validateGroups()">
            
            <div id="group-details" style="display:none;">
                <label>Pessoas por Grupo:</label>
                <input type="number" id="people-per-group" min="1">
                
                <label>Quantidade de Líderes:</label>
                <input type="number" id="qty-leaders">
            </div>
            
            <button id="btn-save-groups" disabled>Salvar Grupos</button>
            <button class="back" onclick="showScreen('screen-main-menu')">Voltar</button>
        </div>
    </div>

    <div id="screen-join-participant" class="screen" style="display:none;">
        <div class="box">
            <h2>Entrar no Jogo</h2>
            <p>Aponte a câmera para o QR Code do Organizador</p>
            <div id="qr-reader" style="width: 100%; height: 200px; background: #ccc;">[Câmera aqui]</div>
            <button class="back" onclick="showScreen('screen-start')">Voltar</button>
        </div>
    </div>

    <div id="screen-map-editor" class="screen" style="display:none;">
        <header>
            <button onclick="saveMap()">Salvar Edição</button>
            <input type="file" id="map-upload" accept="image/*">
        </header>
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="script.js"></script>
</body>
</html>
