<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TrailQuest - Reset Clean</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@700&family=Roboto:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">

    <style>
        /* CSS DE LIMPEZA E BASE VISUAL */
        :root {
            --verde: #2e7d32;
            --marrom: #3e2723;
            --creme: rgba(255, 253, 231, 0.98);
            --branco: #ffffff;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body, html { 
            height: 100%; width: 100%; 
            font-family: 'Special Elite', serif; 
            background: #1a1a1a; 
            overflow: hidden; 
        }

        /* Aplicação da Fonte Roboto e Fundo Branco nos Inputs */
        input, select, textarea {
            font-family: 'Roboto', sans-serif !important;
            background-color: var(--branco) !important;
            color: #333 !important;
            border: 2px solid var(--marrom);
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            text-align: center;
            font-size: 1rem;
            margin: 10px 0;
        }

        .cenario-base {
            width: 100vw; height: 100vh;
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1441974231531-c6227db76b6e?q=80&w=1000');
            background-size: cover; background-position: center;
            display: flex; align-items: center; justify-content: center;
        }

        .painel-limpo {
            background: var(--creme);
            border: 3px solid var(--marrom);
            padding: 30px;
            width: 85%;
            max-width: 400px;
            box-shadow: 10px 10px 0px var(--marrom);
            text-align: center;
        }

        .btn-base {
            width: 100%;
            padding: 16px;
            background: var(--verde);
            color: white;
            border: 2px solid var(--marrom);
            font-family: 'Montserrat', sans-serif;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 15px;
        }

        .titulo-v { font-family: 'Dancing Script', cursive; color: var(--verde); font-size: 3rem; }
    </style>
</head>
<body>

    <div id="app-root">
        <div class="cenario-base">
            <div class="painel-limpo">
                <h1 class="titulo-v">TrailQuest</h1>
                <p style="font-family: 'Montserrat'; font-size: 0.8rem; margin-bottom: 20px;">SISTEMA REINICIADO E LIMPO</p>
                <input type="text" placeholder="Teste de Fonte Roboto">
                <button class="btn-base" onclick="console.log('Sistema pronto')">Aguardando Idealização...</button>
            </div>
        </div>
    </div>

    <script>
        /* SCRIPT DE LIMPEZA - RESET DE MEMÓRIA */
        console.clear();
        const App = {
            versao: "1.0.0-reset",
            status: "Pronto para novos comandos"
        };
        // O código está propositalmente simples para garantir que nada trave.
    </script>
</body>
</html>
